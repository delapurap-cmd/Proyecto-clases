// =====================================================
// INTERACCIÓN DEL CÍRCULO: TAP + ROTACIÓN
// =====================================================
// El círculo se comporta como una rueda real:
//  - Tap sobre una casilla → la selecciona (solo si NO hubo rotación).
//  - Drag sobre el círculo → &quot;gira&quot; el shape iluminado siguiendo el dedo.
//    El shape (tonalidad + armonía + iluminados CUSTOM) se mueve POR PASOS
//    DEL CÍRCULO DE QUINTAS (1 paso = 30° = 1 quinta = +7 semitonos).
//  - Wheel del mouse → un step por cada notch.

const TAP_THRESHOLD_PX = 8;     // si el puntero se mueve más de esto, NO es tap
const SEGMENT_DEG = 30;         // cada paso del círculo es 30°

let dragState = null;
// dragState = {
//   startX, startY,                  // posición inicial del puntero
//   startAngle,                      // ángulo inicial respecto al centro
//   lastAngle,                       // ángulo del último frame
//   accumulatedSteps,                // pasos del círculo ya aplicados
//   keyId,                           // casilla origen (para tap)
//   moved,                           // ¿pasó el umbral de tap?
// }

function getSvgCenter() {
  const svg = document.querySelector('svg.circle-svg');
  const rect = svg.getBoundingClientRect();
  return {
    cx: rect.left + rect.width/2,
    cy: rect.top + rect.height/2,
    pxPerVbUnit: rect.width / VB,  // factor px por unidad del viewBox
  };
}

// Devuelve 'major' o 'minor' según si la distancia al centro está en el anillo
// exterior (mayor) o interior (menor) del círculo musical.
function ringAtPoint(x, y) {
  const { cx, cy, pxPerVbUnit } = getSvgCenter();
  const dist = Math.sqrt((x-cx)*(x-cx) + (y-cy)*(y-cy));
  const distVb = dist / pxPerVbUnit;
  // R_MAJOR es el radio exterior, R_MINOR el límite entre mayor y menor,
  // R_CENTER el límite interior. Mayor: R_MINOR < r < R_MAJOR. Menor: R_CENTER < r < R_MINOR.
  if (distVb >= R_MINOR &amp;&amp; distVb <= R_MAJOR + 20) return 'major';
  if (distVb >= R_CENTER &amp;&amp; distVb < R_MINOR)      return 'minor';
  return null; // fuera del anillo musical
}

// Ángulo en grados de un punto respecto a un centro. 0° = arriba, sentido horario positivo.
function angleFromCenter(x, y, cx, cy) {
  const dx = x - cx;
  const dy = y - cy;
  // atan2 devuelve radianes con 0 a la derecha y CCW positivo.
  // Lo convertimos a &quot;0 arriba, CW positivo&quot;.
  let deg = Math.atan2(dy, dx) * 180 / Math.PI; // -180..180
  deg = deg + 90; // ahora 0 = arriba
  // Normalizar a -180..180
  while (deg > 180)  deg -= 360;
  while (deg < -180) deg += 360;
  return deg;
}

// Diferencia angular más corta entre dos ángulos (-180..180)
function angleDelta(a, b) {
  let d = a - b;
  while (d > 180)  d -= 360;
  while (d < -180) d += 360;
  return d;
}

// Convierte un keyId al anillo opuesto (mayor↔menor) preservando la posición horaria.
// Ej: M-C ↔ m-Am, M-G ↔ m-Em (sus relativas).
function flipKeyRing(keyId) {
  const isMajor = keyId.startsWith('M-');
  const idx = getKeyIndex(keyId);
  const k = musicalKeys[idx];
  return isMajor ? k.minorId : k.majorId;
}

// Mueve el &quot;shape&quot; del círculo (selectedKeyId + harmony + illuminated) por pasos
// del CÍRCULO DE QUINTAS. 1 paso = +1 posición horaria = +7 semitonos.
// Si flipRing=true, también voltea el anillo (mayor↔menor) de la tonalidad seleccionada.
function rotateByCircleSteps(steps, flipRing = false) {
  // Pasos del círculo → semitonos cromáticos. El inverso de 7 mod 12 es 7, así que
  // semitones = steps * 7 hace que transposeKeyId avance 'steps' posiciones horarias.
  const semitones = steps * 7;

  let didSomething = false;
  if (state.illuminatedKeys.size > 0) {
    state.illuminatedKeys = transposeKeySet(state.illuminatedKeys, semitones);
    state.highlightOrder = state.highlightOrder.map(k => transposeKeyId(k, semitones));
    transposeProgressionAuxState(semitones);
    didSomething = true;
  }
  if (state.selectedKeyId) {
    let next = transposeKeyId(state.selectedKeyId, semitones);
    if (flipRing) next = flipKeyRing(next);
    state.selectedKeyId = next;
    generateHarmony(state.selectedKeyId);
    recomputeMode();
    didSomething = true;
  }
  if (didSomething &amp;&amp; (steps !== 0 || flipRing)) {
    refreshTransposeValue();
  }
  return didSomething;
}

function setupCircleInteraction() {
  const svg = document.querySelector('svg.circle-svg');

  // --- WHEEL: 1 notch = 1 paso del círculo ---
  let wheelAccum = 0;
  svg.addEventListener('wheel', e => {
    e.preventDefault();
    wheelAccum += e.deltaY;
    let changed = false;
    while (wheelAccum >= 50)  { rotateByCircleSteps(1);  wheelAccum -= 50; changed = true; }
    while (wheelAccum <= -50) { rotateByCircleSteps(-1); wheelAccum += 50; changed = true; }
    if (changed) renderAll();
  }, { passive: false });

  // --- POINTER (touch + mouse drag) ---
  svg.addEventListener('pointerdown', e => {
    // No interferimos con los botones irregulares
    if (e.target.classList &amp;&amp; e.target.classList.contains('ibtn')) return;

    const isSeg = e.target.classList &amp;&amp; e.target.classList.contains('seg');
    const keyId = isSeg ? e.target.dataset.keyid : null;

    const { cx, cy } = getSvgCenter();
    const ang = angleFromCenter(e.clientX, e.clientY, cx, cy);
    const ring = ringAtPoint(e.clientX, e.clientY);

    dragState = {
      startX: e.clientX,
      startY: e.clientY,
      startAngle: ang,
      lastAngle: ang,
      accumulatedSteps: 0,
      keyId: keyId,
      moved: false,
      lastRing: ring, // 'major' o 'minor' o null
    };

    try { svg.setPointerCapture(e.pointerId); } catch(_) {}
  });

  svg.addEventListener('pointermove', e => {
    if (!dragState) return;

    const dx = e.clientX - dragState.startX;
    const dy = e.clientY - dragState.startY;
    if (Math.sqrt(dx*dx + dy*dy) > TAP_THRESHOLD_PX) {
      dragState.moved = true;
    }

    const { cx, cy } = getSvgCenter();
    const currentAngle = angleFromCenter(e.clientX, e.clientY, cx, cy);

    // 1) ROTACIÓN angular: pasos del círculo desde el inicio del drag
    const totalDelta = angleDelta(currentAngle, dragState.startAngle);
    const targetSteps = Math.round(totalDelta / SEGMENT_DEG);
    const stepsToApply = targetSteps - dragState.accumulatedSteps;

    // 2) CAMBIO DE ANILLO (mayor↔menor): si el dedo pasó del anillo exterior
    //    al interior (o viceversa), forzamos un flip de la tonalidad seleccionada.
    const currentRing = ringAtPoint(e.clientX, e.clientY);
    let needFlip = false;
    if (currentRing &amp;&amp; dragState.lastRing &amp;&amp; currentRing !== dragState.lastRing) {
      needFlip = true;
      dragState.lastRing = currentRing;
    } else if (currentRing &amp;&amp; !dragState.lastRing) {
      dragState.lastRing = currentRing;
    }

    if (stepsToApply !== 0 || needFlip) {
      rotateByCircleSteps(stepsToApply, needFlip);
      dragState.accumulatedSteps = targetSteps;
      renderAll();
    }
  });

  function endDrag(e) {
    if (!dragState) return;
    // Tap genuino: no hubo movimiento significativo Y el origen fue una casilla
    if (!dragState.moved &amp;&amp; dragState.keyId) {
      onSegmentTap(dragState.keyId, e);
      renderAll();
    }
    try { svg.releasePointerCapture(e.pointerId); } catch(_) {}
    dragState = null;
  }

  svg.addEventListener('pointerup', endDrag);
  svg.addEventListener('pointercancel', endDrag);
}

// =====================================================
// RENDER MAESTRO
// =====================================================
function renderAll() {
  renderCircle();
  renderIrregularButtons();
}

// Init
generateHarmony(state.selectedKeyId);
state.anchorIlluminated = new Set();
state.anchorHighlightOrder = [];
updateModeIndicator();
renderAll();
setupCircleInteraction();
</script>

<script>
  const tabs = document.querySelectorAll('.tab');
  const widgetTitle = document.getElementById('widgetTitle');
  const circuloFrame = document.getElementById('circuloFrame');
  const pianoFrame = document.getElementById('pianoFrame');
  const fretboardFrame = document.getElementById('fretboardFrame');

  // === PIANO: inyección que adapta el archivo original al panel del shell.
  // Esta es la versión que funciona bien con el pentagrama renderizado correctamente.
  if (pianoFrame) {
    pianoFrame.addEventListener('load', function(){
      try {
        var pdoc = pianoFrame.contentDocument;
        if (!pdoc) return;
        var st = pdoc.createElement('style');
        st.textContent =
          /* Ocultar elementos intrusivos */
          '.header,.audio-monitor,#audio-monitor{display:none!important}' +
          /* Body como flex container vertical sin scroll */
          'html,body{height:100%!important;margin:0!important;padding:0!important;' +
            'overflow:hidden!important;background:#090909!important}' +
          'body{display:flex!important;flex-direction:column!important;gap:4px!important;padding:6px!important}' +
          /* Score (pentagrama) y piano: que se repartan el espacio vertical */
          '#score-wrap{flex:1 1 auto!important;min-height:0!important;margin:0!important;' +
            'padding:6px!important;overflow-y:auto!important;overflow-x:hidden!important;display:block!important}' +
          '#pentagramas{width:100%!important;max-height:100%!important;overflow:visible!important}' +
          '#pentagramas svg{overflow:visible!important}' +
          '#pentagramas svg{max-width:100%!important;max-height:100%!important;height:auto!important}' +
          '#piano-wrap{flex:0 0 auto!important;position:relative!important;margin:0!important;' +
            'padding:0!important;height:auto!important}' +
          '#piano-scroll{overflow-x:auto!important;overflow-y:hidden!important;margin:0!important;padding:0!important}' +
          '#piano-canvas{display:block!important;max-height:130px!important}' +
          /* Ocultar sustain interno: la edición la controla el shell */
          '.sustain-toggle{display:none!important}';
        pdoc.head.appendChild(st);
        setTimeout(function(){
          pianoFrame.contentWindow.dispatchEvent(new Event('resize'));
        }, 100);
      } catch(e) { console.warn('piano inject:', e); }
    });
  }

  // === Inyección CSS al iframe del Fretboard ===
  if (fretboardFrame) {
    fretboardFrame.addEventListener('load', function(){
      try {
        var fdoc = fretboardFrame.contentDocument;
        if (!fdoc) return;
        var st = fdoc.createElement('style');
        st.textContent =
          /* Fondo negro continuo en TODO el documento (html/body/page).
             El fretboard original usa .page con height fijo y overflow:hidden,
             lo que recorta los controles cuando se reducen. Lo liberamos. */
          'html{height:100%!important;overflow:auto!important;background:#000!important}' +
          'body{height:auto!important;min-height:100%!important;margin:0!important;' +
          'padding:0!important;overflow:visible!important;background:#000!important;' +
          'display:block!important}' +
          /* .page: liberar el flujo, sin altura fija ni overflow:hidden, fondo
             extendido para cubrir todo el alto del documento */
          '.page{height:auto!important;max-height:none!important;min-height:100%!important;' +
          'overflow:visible!important;background:#000!important}' +
          /* Controles a 65% del tamaño original */
          '.controls{zoom:0.65!important}';
        fdoc.head.appendChild(st);
        setTimeout(function(){
          fretboardFrame.contentWindow.dispatchEvent(new Event('resize'));
          ensureFretManualTools();
        }, 100);
      } catch(e) { console.warn('fretboard inject:', e); }
    });
  }

  const textPane = document.getElementById('textPane');
  const canvas = document.getElementById('canvas');
  let activeTab = 'circulo', counter = 0;

  var PIANO_HAND_BLUE = '#2F80ED';
  var PIANO_HAND_YELLOW = '#F5C518';
  var pianoPaintMode = null;
  var pianoPaintNotes = new Map();
  var fretDrawMode = false;

  function syncPianoPaintRenderer() {
    try {
      var pwin = pianoFrame && pianoFrame.contentWindow;
      if (!pwin || !pwin.document || typeof pwin.drawPiano !== 'function') return;
      if (!pwin.__mtmPaintPatched) {
        pwin.__mtmPaintPatched = true;
        pwin.__mtmPaintNotes = {};
        pwin.eval("(function(){ if (!window.__mtmOriginalKeyColor && typeof keyColor === 'function') window.__mtmOriginalKeyColor = keyColor; keyColor = function(m){ var painted = window.__mtmPaintNotes && window.__mtmPaintNotes[m]; return painted || window.__mtmOriginalKeyColor(m); }; })();");
      }
    } catch(e) { console.warn('syncPianoPaintRenderer:', e); }
  }

  function refreshPianoPaint() {
    try {
      var pwin = pianoFrame && pianoFrame.contentWindow;
      if (!pwin) return;
      syncPianoPaintRenderer();
      pwin.__mtmPaintNotes = {};
      pianoPaintNotes.forEach(function(color, midi){ pwin.__mtmPaintNotes[midi] = color; });
      if (typeof pwin.drawPiano === 'function') pwin.drawPiano();
      else if (typeof pwin.scheduleRender === 'function') pwin.scheduleRender();
    } catch(e) { console.warn('refreshPianoPaint:', e); }
  }

  function setPianoPaintMode(color) {
    pianoPaintMode = (pianoPaintMode === color) ? null : color;
    var blue = document.getElementById('pianoPaintBlueBtn');
    var yellow = document.getElementById('pianoPaintYellowBtn');
    if (blue) blue.classList.toggle('active', pianoPaintMode === PIANO_HAND_BLUE);
    if (yellow) yellow.classList.toggle('active', pianoPaintMode === PIANO_HAND_YELLOW);
    syncPianoPaintRenderer();
  }

  function togglePaintedPianoKey(midi, color) {
    if (!color) return;
    if (pianoPaintNotes.get(midi) === color) pianoPaintNotes.delete(midi);
    else pianoPaintNotes.set(midi, color);
    refreshPianoPaint();
  }

  function num(v, fallback) {
    v = parseFloat(v);
    return Number.isFinite(v) ? v : fallback;
  }

  function clampNum(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function ensureCardPositioned(card) {
    if (card.classList.contains('positioned')) return;
    var rect = card.getBoundingClientRect();
    var cRect = canvas.getBoundingClientRect();
    card.classList.add('positioned');
    card.style.left = (rect.left - cRect.left) + 'px';
    card.style.top  = (rect.top  - cRect.top)  + 'px';
  }

  function applyCropGeometry(card) {
    var stage = card.querySelector('.mtm-crop-stage');
    var inner = card.querySelector('.mtm-crop-inner');
    if (!stage || !inner) return;

    var aspect = Math.max(0.1, num(card.dataset.aspect, 4.2));
    var sourceW = Math.max(80, num(card.dataset.sourceW, card.offsetWidth || 520));
    var minVisible = Math.min(90, sourceW * 0.45);
    var cropL = Math.max(0, num(card.dataset.cropLeft, 0));
    var cropR = Math.max(0, num(card.dataset.cropRight, 0));
    var maxCropTotal = Math.max(0, sourceW - minVisible);
    if (cropL + cropR > maxCropTotal) {
      var over = cropL + cropR - maxCropTotal;
      if (cropR >= over) cropR -= over;
      else { over -= cropR; cropR = 0; cropL = Math.max(0, cropL - over); }
    }

    var visibleW = Math.max(minVisible, sourceW - cropL - cropR);
    var sourceH = sourceW / aspect;

    card.dataset.sourceW = sourceW;
    card.dataset.cropLeft = cropL;
    card.dataset.cropRight = cropR;
    card.style.width = visibleW + 'px';
    stage.style.setProperty('--crop-stage-h', sourceH + 'px');
    stage.style.setProperty('--crop-source-w', sourceW + 'px');
    stage.style.setProperty('--crop-left-px', cropL + 'px');
    inner.style.width = sourceW + 'px';
    inner.style.height = sourceH + 'px';
    if (card.classList.contains('selected')) repositionActions(card);
  }

  function wireCropHandles(card) {
    applyCropGeometry(card);
    card.querySelectorAll('.crop-edge').forEach(function(handle){
      handle.addEventListener('pointerdown', function(e){
        e.preventDefault();
        e.stopPropagation();
        selectCard(card);
        ensureCardPositioned(card);

        var side = handle.classList.contains('crop-left') ? 'left' : 'right';
        var sx = e.clientX;
        var startSourceW = num(card.dataset.sourceW, card.offsetWidth || 520);
        var startCropL = num(card.dataset.cropLeft, 0);
        var startCropR = num(card.dataset.cropRight, 0);
        var startLeft = num(card.style.left, card.offsetLeft || 0);
        var minVisible = Math.min(90, startSourceW * 0.45);

        function mv(ev){
          var dx = ev.clientX - sx;
          if (side === 'left') {
            var nextL = clampNum(startCropL + dx, 0, startSourceW - startCropR - minVisible);
            card.dataset.cropLeft = nextL;
            card.style.left = (startLeft + (nextL - startCropL)) + 'px';
          } else {
            var nextR = clampNum(startCropR - dx, 0, startSourceW - startCropL - minVisible);
            card.dataset.cropRight = nextR;
          }
          applyCropGeometry(card);
        }
        function up(){
          window.removeEventListener('pointermove', mv);
          window.removeEventListener('pointerup', up);
        }
        window.addEventListener('pointermove', mv);
        window.addEventListener('pointerup', up);
      });
    });
  }

  function makeCropCardFromHTML(html, width, extraClass, aspect) {
    counter++;
    var card = document.createElement('div');
    card.className = 'card crop-card ' + (extraClass || '');
    card.dataset.aspect = aspect || 4.2;
    card.dataset.sourceW = width || 520;
    card.dataset.cropLeft = 0;
    card.dataset.cropRight = 0;
    card.innerHTML =
      '<div class="card-actions">' +
        '<button class="up">↑</button><button class="dn">↓</button><button class="del">✕</button>' +
      '</div>' +
      '<div class="card-snapshot"><div class="mtm-crop-stage"><div class="mtm-crop-inner">' + html + '</div></div></div>' +
      '<div class="crop-edge crop-left" title="Recortar desde la izquierda"></div>' +
      '<div class="crop-edge crop-right" title="Recortar desde la derecha"></div>' +
      '<div class="resize-handle" title="Escalar"></div>';
    canvas.appendChild(card);
    wireCropHandles(card);
    wireDragResize(card);
    wireCard(card);
    return card;
  }

  function ensureFretManualTools() {
    try {
      var fwin = fretboardFrame && fretboardFrame.contentWindow;
      var fdoc = fretboardFrame && fretboardFrame.contentDocument;
      if (!fwin || !fdoc) return;
      var svg = fdoc.getElementById('fretboard');
      if (!svg) return;

      if (!fwin.__mtmManualFretNotes) fwin.__mtmManualFretNotes = new Map();
      if (typeof fwin.__mtmManualDrawMode !== 'boolean') fwin.__mtmManualDrawMode = false;

      function parseViewBox(svgEl) {
        var vb = (svgEl.getAttribute('viewBox') || '0 0 900 220').trim().split(/\s+/).map(Number);
        return { x: vb[0] || 0, y: vb[1] || 0, w: vb[2] || 900, h: vb[3] || 220 };
      }
      function fretXList(W, boardX) {
        var NUM_FRETS = 22, NUT_WIDTH = 16, DECAY_RATIO = 0.94;
        var fretX = [boardX + NUT_WIDTH];
        var avail = W - boardX - NUT_WIDTH;
        var sum = 0;
        for (var i = 0; i < NUM_FRETS; i++) sum += Math.pow(DECAY_RATIO, i);
        var initial = avail / sum;
        var cur = boardX + NUT_WIDTH;
        for (var j = 0; j < NUM_FRETS; j++) {
          cur += initial * Math.pow(DECAY_RATIO, j);
          fretX.push(cur);
        }
        return fretX;
      }
      function noteAtManual(stringIdx, fret) {
        var tuning = ['E','B','G','D','A','E'];
        var notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        var openIdx = notes.indexOf(tuning[stringIdx]);
        return notes[(openIdx + fret) % 12];
      }
      function svgEl(tag) { return fdoc.createElementNS('http://www.w3.org/2000/svg', tag); }
      function manualGeometry() {
        var currentSvg = fdoc.getElementById('fretboard');
        if (currentSvg) svg = currentSvg;
        var vb = parseViewBox(svg);
        var rootStyle = fwin.getComputedStyle(fdoc.documentElement);
        var railWidth = parseFloat(rootStyle.getPropertyValue('--string-rail-w')) || 34;
        var boardX = railWidth;
        var boardY = 10;
        var boardH = Math.max(48, vb.h - 10 - 6 - 18);
        var spacing = boardH / 6;
        return { vb: vb, boardX: boardX, boardY: boardY, boardH: boardH, spacing: spacing, fretX: fretXList(vb.w, boardX) };
      }
      fwin.__mtmRenderManualNotes = function() {
        var currentSvg = fdoc.getElementById('fretboard');
        if (!currentSvg) return;
        svg = currentSvg;
        var old = svg.querySelector('g.mtm-manual-notes');
        if (old) old.remove();
        var group = svgEl('g');
        group.setAttribute('class', 'mtm-manual-notes');
        var geo = manualGeometry();
        var radius = Math.max(7, Math.min(18, (geo.spacing * 0.5) - 1));
        var textSize = Math.max(8, Math.min(14, radius * 0.95));
        fwin.__mtmManualFretNotes.forEach(function(_, key){
          var parts = key.split('_').map(Number);
          var sIdx = parts[0], fret = parts[1];
          var cx = fret === 0 ? geo.fretX[0] - 8 : (geo.fretX[fret - 1] + geo.fretX[fret]) / 2;
          var cy = geo.boardY + sIdx * geo.spacing + geo.spacing / 2;
          var halo = svgEl('circle');
          halo.setAttribute('cx', cx); halo.setAttribute('cy', cy); halo.setAttribute('r', radius + 3);
          halo.setAttribute('fill', 'rgba(47,128,237,0.28)');
          group.appendChild(halo);
          var c = svgEl('circle');
          c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', radius);
          c.setAttribute('fill', '#2F80ED');
          group.appendChild(c);
          var t = svgEl('text');
          t.setAttribute('x', cx); t.setAttribute('y', cy);
          t.setAttribute('fill', '#fff');
          t.setAttribute('font-size', textSize);
          t.setAttribute('font-family', 'Inter, -apple-system, sans-serif');
          t.setAttribute('font-weight', '800');
          t.setAttribute('text-anchor', 'middle');
          t.setAttribute('dominant-baseline', 'central');
          t.textContent = noteAtManual(sIdx, fret);
          group.appendChild(t);
        });
        svg.appendChild(group);
      };
      fwin.__mtmFretPointFromEvent = function(e) {
        var currentSvg = fdoc.getElementById('fretboard');
        if (!currentSvg) return null;
        svg = currentSvg;
        var pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        var p = pt.matrixTransform(svg.getScreenCTM().inverse());
        var geo = manualGeometry();
        var stringIdx = Math.round((p.y - (geo.boardY + geo.spacing / 2)) / geo.spacing);
        stringIdx = Math.max(0, Math.min(5, stringIdx));
        var fret = 0;
        if (p.x < geo.fretX[0]) fret = 0;
        else {
          for (var f = 1; f <= 22; f++) {
            if (p.x <= geo.fretX[f]) { fret = f; break; }
          }
          if (!fret) fret = 22;
        }
        return { string: stringIdx, fret: fret };
      };
      if (!fwin.__mtmManualReady) {
        fwin.__mtmManualReady = true;

        if (typeof originalRender === 'function') {

          if (!fwin.__mtmManualDrawMode) return;

          var p = fwin.__mtmFretPointFromEvent(e);
          if (!p) return;
          e.preventDefault();
          e.stopPropagation();
          var key = p.string + '_' + p.fret;
          if (fwin.__mtmManualFretNotes.has(key)) fwin.__mtmManualFretNotes.delete(key);
          else fwin.__mtmManualFretNotes.set(key, true);

      }
      if (typeof fwin.__mtmRenderManualNotes === 'function') fwin.__mtmRenderManualNotes();
    } catch(e) { console.warn('ensureFretManualTools:', e); }
  }

  function repositionActions(card){

  // Umbral de snap en píxeles: si el borde queda más cerca que esto de otro
  // borde, "imanta" a esa posición.
  var SNAP_PX = 6;

  // Límites dentro del área útil del lienzo (respetando padding).
  // position:absolute se mide respecto al padding box, pero visualmente
  // queremos que las tarjetas no entren en la zona de márgenes del documento.
  function clampToCanvas(left, top, w, h){
    var cs = getComputedStyle(canvas);
    var padL = parseFloat(cs.paddingLeft)||0, padR = parseFloat(cs.paddingRight)||0;
    var padT = parseFloat(cs.paddingTop)||0,  padB = parseFloat(cs.paddingBottom)||0;
    var maxLeft = canvas.clientWidth  - padR - w;
    var maxTop  = canvas.clientHeight - padB - h;
    return {
      left: Math.max(padL, Math.min(left, maxLeft)),
      top:  Math.max(padT, Math.min(top,  maxTop))
    };
  }

  // Calcula snap de la tarjeta 'card' con pos/tamaño propuestos contra TODAS
  // las otras tarjetas del lienzo. Devuelve {left, top} ajustados.
  function snapPosition(card, left, top, w, h){
    var right  = left + w;
    var bottom = top  + h;
    var others = canvas.querySelectorAll('.card.positioned');
    // También snap contra bordes del lienzo
    var vGuides = [0, canvas.clientWidth];
    var hGuides = [0, canvas.clientHeight];
    others.forEach(function(o){
      if (o === card) return;
      var l = o.offsetLeft, t = o.offsetTop;
      var r = l + o.offsetWidth, b = t + o.offsetHeight;
      vGuides.push(l, r);
      hGuides.push(t, b);
    });
    // Snap horizontal (left/right de 'card' contra líneas verticales)
    for (var i=0;i<vGuides.length;i++){
      var g = vGuides[i];
      if (Math.abs(left - g) < SNAP_PX) { left = g; break; }
      if (Math.abs(right - g) < SNAP_PX) { left = g - w; break; }
    }
    // Snap vertical
    for (var j=0;j<hGuides.length;j++){
      var g2 = hGuides[j];
      if (Math.abs(top - g2) < SNAP_PX) { top = g2; break; }
      if (Math.abs(bottom - g2) < SNAP_PX) { top = g2 - h; break; }
    }
    return { left: left, top: top };
  }

  // Drag (sobre la tarjeta entera) + Resize (handle esquina inferior derecha)
  // === Undo / Redo / Borrar sistema ===
  var _b; _b = document.getElementById('undoBtn'); if (_b) _b.addEventListener('click', undoMelody);
  _b = document.getElementById('redoBtn'); if (_b) _b.addEventListener('click', redoMelody);
  _b = document.getElementById('delSystemBtn'); if (_b) _b.addEventListener('click', deleteLastSystem);

  // === Toggle "Sostener notas" del piano ===
  var sustainOn = false;
  var origReleasePointer = null;
  // Set local de notas sostenidas (lo manejamos desde el shell porque
  // activeNotes del piano es const y no accesible desde el contentWindow).
  var sustainedNotes = new Set();

  // === MODO MELODÍA: secuencia de negras con compases automáticos ===
  var melodySequence = []; // array de midi numbers
  var melodyHistory = [];   // stack para undo
  var melodyFuture = [];    // stack para redo
  var melodyHandlerActive = false;

  function pushHistory() {
    melodyHistory.push(melodySequence.slice());
    if (melodyHistory.length > 100) melodyHistory.shift();
    melodyFuture = []; // cualquier acción nueva borra el redo
  }
  function undoMelody() {
    if (!melodyHistory.length) return;
    melodyFuture.push(melodySequence.slice());
    melodySequence = melodyHistory.pop();
    renderMelody();
  }
  function redoMelody() {
    if (!melodyFuture.length) return;
    melodyHistory.push(melodySequence.slice());
    melodySequence = melodyFuture.pop();
    renderMelody();
  }
  function deleteLastSystem() {
    if (!melodySequence.length) return;
    pushHistory();
    // Un sistema = 4 compases = 16 negras. Borrar las últimas 16 (o menos).
    var notesToRemove = Math.min(16, melodySequence.length);
    melodySequence.splice(melodySequence.length - notesToRemove, notesToRemove);
    renderMelody();
  }

  function midiToVexNote(midi) {
    var names = ['c','c#','d','eb','e','f','f#','g','ab','a','bb','b'];
    var n = names[midi % 12];
    var octave = Math.floor(midi/12) - 1;
    return n + '/' + octave;
  }

  function renderMelody() {
    try {
      var pwin = pianoFrame.contentWindow;
      var pdoc = pianoFrame.contentDocument;
      var VF = pwin && pwin.Vex && pwin.Vex.Flow;
      var pentWrap = pdoc && pdoc.getElementById('pentagramas');
      if (!VF || !pentWrap) return;

      // Decidir clave (treble/bass) según altura: notas >= C4 (60) van al treble
      function clefForMidi(m) { return m >= 60 ? 'treble' : 'bass'; }

      var measures = [];
      var current = { treble: [], bass: [] };
      melodySequence.forEach(function(item){
        // item puede ser un midi simple o un array (acorde)
        var notes = Array.isArray(item) ? item : [item];
        var trebleKeys = [], bassKeys = [];
        notes.forEach(function(m){
          if (clefForMidi(m) === 'treble') trebleKeys.push(midiToVexNote(m));
          else bassKeys.push(midiToVexNote(m));
        });
        function buildNote(clef, keys) {
          if (keys.length === 0) {
            return new VF.StaveNote({clef: clef, keys: clef === 'treble' ? ['b/4'] : ['d/3'], duration:'qr'});
          }
          // Ordenar las keys de grave a agudo (VexFlow lo requiere)
          keys = keys.slice().sort(function(a,b){
            var oa = parseInt(a.split('/')[1],10), ob = parseInt(b.split('/')[1],10);
            if (oa !== ob) return oa - ob;
            var pitches = ['c','c#','d','eb','e','f','f#','g','ab','a','bb','b'];
            return pitches.indexOf(a.split('/')[0]) - pitches.indexOf(b.split('/')[0]);
          });
          var sn = new VF.StaveNote({clef: clef, keys: keys, duration:'q'});
          keys.forEach(function(k, i) {
            if (k.indexOf('#') >= 0) sn.addModifier(new VF.Accidental('#'), i);
            else if (k.length > 2 && k.charAt(1) === 'b') sn.addModifier(new VF.Accidental('b'), i);
          });
          return sn;
        }
        current.treble.push(buildNote('treble', trebleKeys));
        current.bass.push(buildNote('bass', bassKeys));
        if (current.treble.length === 4) {
          measures.push(current);
          current = { treble: [], bass: [] };
        }
      });
      // Rellenar último compás con silencios
      while (current.treble.length > 0 && current.treble.length < 4) {
        current.treble.push(new VF.StaveNote({clef:'treble', keys:['b/4'], duration:'qr'}));
        current.bass.push(new VF.StaveNote({clef:'bass', keys:['d/3'], duration:'qr'}));
      }
      if (current.treble.length === 4) measures.push(current);
      if (measures.length === 0) {
        // Compás vacío inicial
        var empT = [], empB = [];
        for (var k0 = 0; k0 < 4; k0++) {
          empT.push(new VF.StaveNote({clef:'treble', keys:['b/4'], duration:'qr'}));
          empB.push(new VF.StaveNote({clef:'bass', keys:['d/3'], duration:'qr'}));
        }
        measures.push({treble: empT, bass: empB});
      }

      var totalMeasures = measures.length;
      var availW = pentWrap.clientWidth || 400;
      // FIJO: 4 compases por sistema. El ancho de cada compás se calcula
      // para que entre todo en el ancho disponible.
      var measuresPerSystem = 4;
      var firstW = Math.max(180, (availW - 30) / measuresPerSystem * 1.25);
      var measureW = (availW - 20 - firstW) / (measuresPerSystem - 1);
      if (measureW < 100) measureW = 100;
      var systems = Math.ceil(totalMeasures / measuresPerSystem);
      var systemH = 200; // dos staves + brace
      var totalH = systems * systemH + 20;

      pentWrap.innerHTML = '';
      var renderer = new VF.Renderer(pentWrap, VF.Renderer.Backends.SVG);
      renderer.resize(availW, totalH);
      var ctx = renderer.getContext();

      for (var sys = 0; sys < systems; sys++) {
        var startM = sys * measuresPerSystem;
        var endM = Math.min(startM + measuresPerSystem, totalMeasures);
        var x = 10;
        var yT = 10 + sys * systemH;
        var yB = yT + 80;
        for (var mi = startM; mi < endM; mi++) {
          var isFirstOfRow = (mi === startM);
          var w = isFirstOfRow ? firstW : measureW;
          var staveT = new VF.Stave(x, yT, w);
          var staveB = new VF.Stave(x, yB, w);
          if (mi === 0) {
            staveT.addClef('treble').addTimeSignature('4/4');
            staveB.addClef('bass').addTimeSignature('4/4');
          } else if (isFirstOfRow) {
            staveT.addClef('treble');
            staveB.addClef('bass');
          }
          staveT.setContext(ctx).draw();
          staveB.setContext(ctx).draw();
          // Brace + línea conectora solo en el primer compás del sistema
          if (isFirstOfRow) {
            var brace = new VF.StaveConnector(staveT, staveB).setType(VF.StaveConnector.type.BRACE);
            var lineL = new VF.StaveConnector(staveT, staveB).setType(VF.StaveConnector.type.SINGLE_LEFT);
            brace.setContext(ctx).draw();
            lineL.setContext(ctx).draw();
          }
          // Línea derecha (barra divisoria del sistema) en el último compás del sistema
          if (mi === endM - 1) {
            var lineR = new VF.StaveConnector(staveT, staveB).setType(VF.StaveConnector.type.SINGLE_RIGHT);
            lineR.setContext(ctx).draw();
          }
          // Voces
          var voiceT = new VF.Voice({num_beats:4, beat_value:4}).addTickables(measures[mi].treble);
          var voiceB = new VF.Voice({num_beats:4, beat_value:4}).addTickables(measures[mi].bass);
          // Ancho útil real del compás (descontando clave + armadura ya añadidas)
          var useW = staveT.getNoteEndX() - staveT.getNoteStartX() - 10;
          new VF.Formatter().joinVoices([voiceT]).joinVoices([voiceB]).format([voiceT, voiceB], useW);
          voiceT.draw(ctx, staveT);
          voiceB.draw(ctx, staveB);
          x += w;
        }
      }

      // Auto-scroll al final del pentagrama (último sistema)
      setTimeout(function(){
        try {
          var sw = pdoc.getElementById('score-wrap');
          if (sw) sw.scrollTop = sw.scrollHeight;
        } catch(e) {}
      }, 0);

      // Forzar dorado: triple cinturón.
      // 1) Inyectar <style> dentro del SVG con regla universal !important
      // 2) Sobrescribir atributos fill/stroke
      // 3) Sobrescribir estilos inline
      var svg = pentWrap.querySelector('svg');
      if (svg) {
        // (1) <style> interno: gana sobre attr y style inline si usa !important
        var styleEl = pdoc.createElementNS('http://www.w3.org/2000/svg','style');
        styleEl.textContent =
          'svg *{fill:#C9A84C!important;stroke:#C9A84C!important}' +
          'svg [fill="none"],svg [fill="transparent"]{fill:none!important}' +
          'svg [stroke="none"],svg [stroke="transparent"]{stroke:none!important}';
        svg.insertBefore(styleEl, svg.firstChild);
        // (2) y (3) reescribir atributos y estilos por si algún elemento usa attr "black" literal
        svg.querySelectorAll('*').forEach(function(el){
          var f = el.getAttribute('fill');
          var sk = el.getAttribute('stroke');
          if (f !== null && f !== 'none' && f !== 'transparent') el.setAttribute('fill','#C9A84C');
          if (sk !== null && sk !== 'none' && sk !== 'transparent') el.setAttribute('stroke','#C9A84C');
          if (el.style) {
            if (el.style.fill && el.style.fill !== 'none' && el.style.fill !== 'transparent') {
              el.style.setProperty('fill', '#C9A84C', 'important');
            }
            if (el.style.stroke && el.style.stroke !== 'none' && el.style.stroke !== 'transparent') {
              el.style.setProperty('stroke', '#C9A84C', 'important');
            }
          }
        });
      }
    } catch(err) { console.warn('renderMelody:', err); }
  }

  function melodyPointerHandler(e) {
    var pwin = pianoFrame.contentWindow;
    var pdoc = pianoFrame.contentDocument;
    if (!pwin || !pdoc) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    var canvasEl = pdoc.getElementById('piano-canvas');
    if (!canvasEl) return;
    var rect = canvasEl.getBoundingClientRect();
    var x = (e.clientX - rect.left) * (canvasEl.width / rect.width);
    var y = (e.clientY - rect.top)  * (canvasEl.height / rect.height);
    var midi = (typeof pwin.midiAtPoint === 'function') ? pwin.midiAtPoint(x, y) : null;
    if (midi === null || midi === undefined) return;
    e.stopPropagation();
    e.preventDefault();
    if (pianoPaintMode) {
      togglePaintedPianoKey(midi, pianoPaintMode);
      if (typeof pwin.noteOn === 'function') pwin.noteOn(midi, 1);
      setTimeout(function(){ if (typeof pwin.noteOff === 'function') pwin.noteOff(midi); refreshPianoPaint(); }, 170);
      return;
    }
    pushHistory();
    if (chordModeOn && melodySequence.length > 0) {
      var last = melodySequence[melodySequence.length - 1];
      if (!Array.isArray(last)) {
        melodySequence[melodySequence.length - 1] = [last, midi];
      } else if (last.indexOf(midi) === -1) {
        last.push(midi);
      }
    } else {
      melodySequence.push(chordModeOn ? [midi] : midi);
    }
    // Iluminar la tecla visualmente y disparar sonido
    if (typeof pwin.markNotePressed === 'function') pwin.markNotePressed(midi);
    if (typeof pwin.noteOn === 'function') pwin.noteOn(midi, 1);
    setTimeout(function(){
      if (typeof pwin.markNoteReleased === 'function') pwin.markNoteReleased(midi);
      if (typeof pwin.noteOff === 'function') pwin.noteOff(midi);
    }, 280);
    renderMelody();
  }

  var origRenderAll = null;
  function activateMelodyMode() {
    if (melodyHandlerActive) return;
    var pwin = pianoFrame.contentWindow;
    var pdoc = pianoFrame.contentDocument;
    var canvasEl = pdoc && pdoc.getElementById('piano-canvas');
    if (!canvasEl) return;
    canvasEl.addEventListener('pointerdown', melodyPointerHandler, true);
    syncPianoPaintRenderer();
    refreshPianoPaint();
    // Sobrescribir renderAll del piano: solo redibuja el teclado, NO el pentagrama
    if (pwin && pwin.renderAll && !origRenderAll) {
      origRenderAll = pwin.renderAll;
      pwin.renderAll = function() {
        if (typeof pwin.drawPiano === 'function') pwin.drawPiano();
        // No tocar el pentagrama: lo controla nuestro renderMelody
      };
    }
    melodyHandlerActive = true;
    renderMelody();
  }
  function deactivateMelodyMode() {
    if (!melodyHandlerActive) return;
    var pwin = pianoFrame.contentWindow;
    var pdoc = pianoFrame.contentDocument;
    var canvasEl = pdoc && pdoc.getElementById('piano-canvas');
    if (canvasEl) canvasEl.removeEventListener('pointerdown', melodyPointerHandler, true);
    // Restaurar renderAll original
    if (origRenderAll && pwin) {
      pwin.renderAll = origRenderAll;
      origRenderAll = null;
      // Forzar un repintado del pentagrama nativo
      if (typeof pwin.scheduleRender === 'function') pwin.scheduleRender();
    }
    melodyHandlerActive = false;
  }
  function clearMelody() {
    melodySequence = [];
    melodyHistory = [];
    melodyFuture = [];
    renderMelody();
  }

  function sustainPointerHandler(e) {
    var pwin = pianoFrame.contentWindow;
    var pdoc = pianoFrame.contentDocument;
    if (!pwin || !pdoc) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    var canvasEl = pdoc.getElementById('piano-canvas');
    if (!canvasEl) return;
    var rect = canvasEl.getBoundingClientRect();
    var x = (e.clientX - rect.left) * (canvasEl.width / rect.width);
    var y = (e.clientY - rect.top)  * (canvasEl.height / rect.height);
    var midi = (typeof pwin.midiAtPoint === 'function') ? pwin.midiAtPoint(x, y) : null;
    if (midi === null || midi === undefined) return;
    e.stopPropagation();
    e.preventDefault();
    // Toggle usando noteOn/noteOff del piano
    if (sustainedNotes.has(midi)) {
      sustainedNotes.delete(midi);
      if (typeof pwin.noteOff === 'function') pwin.noteOff(midi);
    } else {
      sustainedNotes.add(midi);
      if (typeof pwin.noteOn === 'function') pwin.noteOn(midi, 1);
    }
  }

  function insertScoreCard(){
    try {
      var pdoc = pianoFrame.contentDocument;
      var svg = pdoc && pdoc.querySelector('#pentagramas svg');
      if (!svg) { alert('Pentagrama vacío'); return; }
      // Clonar y medir el bbox REAL del contenido (incluye notas que pueden
      // estar fuera del viewBox original, recortadas por overflow:hidden del padre)
      var clone = svg.cloneNode(true);
      // Montar temporalmente fuera de pantalla para poder medir con getBBox
      var measurer = document.createElement('div');
      measurer.style.cssText = 'position:absolute;left:-99999px;top:0;visibility:hidden';
      measurer.appendChild(clone);
      document.body.appendChild(measurer);
      var bbox = null;
      try { bbox = clone.getBBox(); } catch(e) {}
      if (bbox && bbox.width > 0 && bbox.height > 0) {
        // Margen pequeño para que las notas no toquen el borde
        var pad = 4;
        var vx = Math.floor(bbox.x - pad);
        var vy = Math.floor(bbox.y - pad);
        var vw = Math.ceil(bbox.width + pad * 2);
        var vh = Math.ceil(bbox.height + pad * 2);
        clone.setAttribute('viewBox', vx + ' ' + vy + ' ' + vw + ' ' + vh);
        clone.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      }
      document.body.removeChild(measurer);
      clone.removeAttribute('width');
      clone.removeAttribute('height');
      clone.style.width = '100%';
      clone.style.height = 'auto';
      clone.style.display = 'block';
      // Conversión AGRESIVA: todos los fill/stroke no transparentes → currentColor
      // (excepto 'none' que indica explícitamente sin relleno)
      function isTransparent(v) {
        if (!v) return true;
        v = v.trim().toLowerCase();
        return v === 'none' || v === 'transparent' || v === 'rgba(0,0,0,0)';
      }
      clone.querySelectorAll('*').forEach(function(el){
        // Atributos
        var f = el.getAttribute('fill');
        var sk = el.getAttribute('stroke');
        if (f !== null && !isTransparent(f)) el.setAttribute('fill','currentColor');
        if (sk !== null && !isTransparent(sk)) el.setAttribute('stroke','currentColor');
        // Estilos inline (algunos elementos VexFlow usan style="fill:...")
        if (el.style) {
          if (el.style.fill && !isTransparent(el.style.fill)) el.style.fill = 'currentColor';
          if (el.style.stroke && !isTransparent(el.style.stroke)) el.style.stroke = 'currentColor';
        }
      });
      // Quitar estilos SVG internos que puedan escapar y pintar otros SVG del lienzo
      clone.querySelectorAll('style').forEach(function(st){ st.remove(); });
      // Quitar cualquier filter (drop-shadow dorado heredado)
      clone.style.filter = 'none';
      clone.querySelectorAll('[filter],[style*="filter"]').forEach(function(el){
        el.removeAttribute('filter');
        if (el.style) el.style.filter = 'none';
      });
      // Crear tarjeta especial con selector de color
      counter++;
      var card = document.createElement('div');
      card.className = 'card score-card-host';
      card.style.width = '480px';
      card.innerHTML =
        '<div class="card-actions">' +
          '<button class="clr-pick" data-c="auto" title="Auto (sigue el lienzo)">A</button>' +
          '<button class="clr-pick" data-c="#C9A84C" title="Dorado" style="background:#C9A84C"></button>' +
          '<button class="clr-pick" data-c="#000" title="Negro" style="background:#000"></button>' +
          '<button class="clr-pick" data-c="#fff" title="Blanco" style="background:#fff;border:1px solid #999"></button>' +
          '<button class="up">\u2191</button><button class="dn">\u2193</button><button class="del">\u2715</button>' +
        '</div>' +
        '<div class="card-snapshot"><div class="score-card">' + clone.outerHTML + '</div></div>' +
        '<div class="resize-handle"></div>';
      // Listeners de color: aplican fill/stroke DIRECTOS al SVG del pentagrama.
      // Importante: no se inyecta ningún <style> con selector global tipo "svg *",
      // porque eso contaminaba otros SVG insertados, especialmente fretboard/diapasón.
      function applyScoreColor(targetCard, color) {
        var svg = targetCard.querySelector('svg');
        if (!svg) return;

        // Borrar estilos internos anteriores del pentagrama para evitar fugas al documento.
        svg.querySelectorAll('style').forEach(function(st){ st.remove(); });

        svg.style.color = color;
        var holder = targetCard.querySelector('.score-card');
        if (holder) holder.style.color = color;

        svg.querySelectorAll('*').forEach(function(el){
          var tag = (el.tagName || '').toLowerCase();
          if (tag === 'defs' || tag === 'clipPath' || tag === 'mask' || tag === 'linearGradient' || tag === 'radialGradient') return;
          var f = el.getAttribute('fill');
          var sk = el.getAttribute('stroke');
          var fillIsPainted = f !== null && f !== 'none' && f !== 'transparent';
          var strokeIsPainted = sk !== null && sk !== 'none' && sk !== 'transparent';

          if (fillIsPainted) el.setAttribute('fill', color);
          if (strokeIsPainted) el.setAttribute('stroke', color);

          if (el.style) {
            var sf = el.style.fill;
            var ss = el.style.stroke;
            if (sf && sf !== 'none' && sf !== 'transparent') el.style.fill = color;
            if (ss && ss !== 'none' && ss !== 'transparent') el.style.stroke = color;
            el.style.filter = 'none';
          }
        });
      }
      // Estado: color actual de la tarjeta (auto = sigue al lienzo)
      card._scoreMode = 'auto';
      function refreshAuto() {
        if (card._scoreMode !== 'auto') return;
        var dark = canvas.classList.contains('canvas-dark');
        applyScoreColor(card, dark ? '#C9A84C' : '#1a1a1a');
      }
      // Listeners de los botones de color
      card.querySelectorAll('.clr-pick').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          var c = btn.dataset.c;
          if (c === 'auto') {
            card._scoreMode = 'auto';
            refreshAuto();
          } else {
            card._scoreMode = c;
            applyScoreColor(card, c);
          }
        });
      });
      canvas.appendChild(card);
      wireDragResize(card);
      wireCard(card);
      // YA con la card en el DOM: aplicar color automático inicial
      refreshAuto();
      // Observar cambios de clase del lienzo (toggle dark/claro) para repintar
      var observer = new MutationObserver(refreshAuto);
      observer.observe(canvas, {attributes:true, attributeFilter:['class']});
    } catch(e) { console.warn(e); }
  }

  function insertFretboardCard(){
    try {

          clone.setAttribute('height', vb[3]);
          clone.style.aspectRatio = vb[2] + ' / ' + vb[3];

        return;

  function wireDragResize(card){
    card.addEventListener('pointerdown', function(e){
      if (e.target.closest('.resize-handle,.crop-edge,.card-actions')) return;
      if (e.target.closest('[contenteditable]')) return;
      selectCard(card);
      e.preventDefault();
      if (!card.classList.contains('positioned')){
        var rect = card.getBoundingClientRect();
        var cRect = canvas.getBoundingClientRect();
        card.classList.add('positioned');
        card.style.left = (rect.left - cRect.left) + 'px';
        card.style.top  = (rect.top  - cRect.top)  + 'px';
      }
      var sx = e.clientX, sy = e.clientY;
      var sl = parseFloat(card.style.left) || 0;
      var st = parseFloat(card.style.top)  || 0;
      card.classList.add('dragging');
      function mv(ev){
        var w = card.offsetWidth, h = card.offsetHeight;
        var nl = sl + ev.clientX - sx;
        var nt = st + ev.clientY - sy;
        // 1) Limitar al lienzo
        var clamped = clampToCanvas(nl, nt, w, h);
        // 2) Snap contra bordes de otros elementos y del lienzo
        var snapped = snapPosition(card, clamped.left, clamped.top, w, h);
        // 3) Re-clamp después del snap (por si el snap empujó fuera)
        var finalPos = clampToCanvas(snapped.left, snapped.top, w, h);
        card.style.left = finalPos.left + 'px';
        card.style.top  = finalPos.top  + 'px';
        if (card.classList.contains('selected')) repositionActions(card);
      }
      function up(){
        card.classList.remove('dragging');
        window.removeEventListener('pointermove', mv);
        window.removeEventListener('pointerup', up);
      }
      window.addEventListener('pointermove', mv);
      window.addEventListener('pointerup', up);
    });
    var rh = card.querySelector('.resize-handle');
    if (rh){
      rh.addEventListener('pointerdown', function(e){
        e.preventDefault(); e.stopPropagation();
        selectCard(card);
        var isTextCard = card.classList.contains('card-text-type');
        var sx = e.clientX, sy = e.clientY;
        if (isTextCard) {
          // Tarjetas de texto: escalar font-size con el arrastre
          var textEl = card.querySelector('.card-text');
          var startSize = parseFloat(getComputedStyle(textEl).fontSize) || 16;
          function mvT(ev){
            // Delta combinado de x e y para sensación de "pinch"
            var dx = ev.clientX - sx;
            var dy = ev.clientY - sy;
            var delta = (dx + dy) / 2;
            var newSize = Math.max(8, Math.min(120, startSize + delta * 0.3));
            textEl.style.fontSize = newSize + 'px';
            // Que la card se ajuste al contenido (auto-width)
            card.style.width = 'auto';
            repositionActions(card);
          }
          function upT(){
            window.removeEventListener('pointermove', mvT);
            window.removeEventListener('pointerup', upT);
          }
          window.addEventListener('pointermove', mvT);
          window.addEventListener('pointerup', upT);
          return;
        }
        // Tarjetas con crop: la bola inferior derecha escala el contenido completo,
        // no hace zoom dentro de una caja fija.
        var sw = card.offsetWidth;
        var cardLeft = card.offsetLeft || 0;
        var cs = getComputedStyle(canvas);
        var padR = parseFloat(cs.paddingRight)||0;
        if (card.classList.contains('crop-card')) {
          var startSourceW = num(card.dataset.sourceW, sw || 520);
          var startCropL = num(card.dataset.cropLeft, 0);
          var startCropR = num(card.dataset.cropRight, 0);
          var visibleRatio = Math.max(0.08, (startSourceW - startCropL - startCropR) / startSourceW);
          function mvC(ev){
            var targetVisibleW = Math.max(90, sw + ev.clientX - sx);
            var maxVisibleW = canvas.clientWidth - padR - cardLeft;
            if (targetVisibleW > maxVisibleW) targetVisibleW = maxVisibleW;
            var nextSourceW = Math.max(100, targetVisibleW / visibleRatio);
            var scale = nextSourceW / startSourceW;
            card.dataset.sourceW = nextSourceW;
            card.dataset.cropLeft = startCropL * scale;
            card.dataset.cropRight = startCropR * scale;
            applyCropGeometry(card);
          }
          function upC(){
            window.removeEventListener('pointermove', mvC);
            window.removeEventListener('pointerup', upC);
          }
          window.addEventListener('pointermove', mvC);
          window.addEventListener('pointerup', upC);
          return;
        }
        // Tarjetas no-texto normales: comportamiento original (cambiar width)
        function mv(ev){
          var w = Math.max(120, sw + ev.clientX - sx);
          var maxW = canvas.clientWidth - padR - cardLeft;
          if (w > maxW) w = maxW;
          card.style.width = w + 'px';
          if (card.classList.contains('selected')) repositionActions(card);
        }
        function up(){
          window.removeEventListener('pointermove', mv);
          window.removeEventListener('pointerup', up);
        }
        window.addEventListener('pointermove', mv);
        window.addEventListener('pointerup', up);
      });
    }
  }

      card.querySelectorAll('.txt-clr-pick').forEach(function(b){
        b.addEventListener('click', function(e){
          e.stopPropagation();
          var c = b.dataset.c;
          var te = card.querySelector('.card-text');
          if (c === 'auto') {
            te.style.color = '';
            card.dataset.txtColor = 'auto';
          } else {
            te.style.setProperty('color', c, 'important');
            card.dataset.txtColor = c;
          }
        });
      });
      // Botones de formato (B/I/U/tamaño/fuente)
      // execCommand requiere contenteditable activo y selección. Si el usuario
      // no ha seleccionado nada, aplicamos al texto entero seleccionando todo.
      function applyFormatCmd(cmd, val) {
        var te = card.querySelector('.card-text');
        var wasEditable = te.getAttribute('contenteditable') === 'true';
        if (!wasEditable) te.setAttribute('contenteditable','true');
        te.focus();
        var sel = window.getSelection();
        if (!sel || sel.isCollapsed || !te.contains(sel.anchorNode)) {
          // Sin selección: seleccionar todo el contenido del texto
          var range = document.createRange();
          range.selectNodeContents(te);
          sel.removeAllRanges();
          sel.addRange(range);
        }
        try { document.execCommand(cmd, false, val || null); } catch(err) {}
        if (!wasEditable) te.setAttribute('contenteditable','false');
      }
      card.querySelectorAll('.fmt-cmd').forEach(function(b){
        b.addEventListener('mousedown', function(e){ e.preventDefault(); });
        b.addEventListener('click', function(e){
          e.stopPropagation();
          applyFormatCmd(b.dataset.cmd, b.dataset.val);

      if (fontSel) {

        textEl.focus();

        var sel = window.getSelection();
        if (sel.rangeCount > 0) {

      });

      // Forzar render fresco antes de capturar
      try {
        circuloFrame.contentWindow.dispatchEvent(new Event('resize'));
        if (typeof circuloFrame.contentWindow.renderAll === 'function') {
          circuloFrame.contentWindow.renderAll();
        }
      } catch(e) {}

      // SECRETO: replicar la estructura ORIGINAL del .stage:
      //   .stage { position:relative; aspect-ratio:1/1 }
      //     > svg.circle-svg { position:absolute; inset:0; width:100%; height:100% }
      // Y dejar que el SVG escale solo respetando preserveAspectRatio.
      var svgMarkup = '<div class="card-loading">No se pudo capturar el c\u00edrculo</div>';
      try {
        var idoc = circuloFrame.contentDocument;
        var origSvg = idoc && idoc.querySelector('svg.circle-svg');
        if (origSvg) {
          var svgClone = origSvg.cloneNode(true);
          // Quitar capa de botones irregulares
          var irreg = svgClone.querySelector('g[id="irregular-layer"]');
          if (irreg) irreg.parentNode.removeChild(irreg);
          svgClone.setAttribute('xmlns','http://www.w3.org/2000/svg');
          // Recortar el viewBox al área real del círculo (elimina el espacio
          // transparente de las esquinas donde vivían los botones irregulares).
          // El círculo visible va de ~(50,50) a ~(510,510). Usamos (40,40,480,480)
          // para dejar un pequeño margen seguro alrededor del contenido.
          svgClone.setAttribute('viewBox','40 40 480 480');
          svgClone.setAttribute('preserveAspectRatio','xMidYMid meet');
          svgClone.querySelectorAll('[id]').forEach(function(el){ el.removeAttribute('id'); });

          // (para que la rasterización SVG→PNG los respete; algunas rutas de render
          // de navegador ignoran estas props cuando vienen por CSS).
          svgClone.querySelectorAll('text').forEach(function(t){
            t.setAttribute('text-anchor','middle');
            t.setAttribute('dominant-baseline','middle');
            if (!t.getAttribute('font-family')) {
              t.setAttribute('font-family','-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif');
            }
          });
          // Inyectar variables CSS y reglas de texto completas
          var styleEl = document.createElementNS('http://www.w3.org/2000/svg','style');
          styleEl.textContent = 'svg{--segNormal:#1E1E1E;--segSelected:#ffffff;--segRelated:#555555;--segHighlighted:#616161;--ring:#121212;--textMajor:#ffffff;--textMinor:#ffffff;--segBorder:rgba(255,255,255,0.18);--gold:#C9A84C}.seg-text{text-anchor:middle;dominant-baseline:middle;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;fill:var(--textMajor);pointer-events:none}.symbol-text{text-anchor:middle;dominant-baseline:middle;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-weight:900;fill:#000;pointer-events:none}.center-text{text-anchor:middle;dominant-baseline:middle;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;fill:#fff;font-weight:900;pointer-events:none}.dim-marker{fill:none;stroke:#fff;stroke-width:1.6;pointer-events:none}';
          svgClone.insertBefore(styleEl, svgClone.firstChild);
          // Estilos inline IDÉNTICOS al original svg.circle-svg
          svgClone.removeAttribute('width');
          svgClone.removeAttribute('height');
          svgClone.style.position = 'absolute';
          svgClone.style.inset = '0';
          svgClone.style.width = '100%';
          svgClone.style.height = '100%';
          svgClone.style.display = 'block';
          svgMarkup = svgClone.outerHTML;
        }
      } catch(e) { console.warn('snapshot:', e); }

      card.innerHTML = '<div class="card-actions"><button class="up">\u2191</button><button class="dn">\u2193</button><button class="del">\u2715</button></div>'
        + '<div class="card-snapshot"><div class="snap-stage">' + svgMarkup + '</div></div>'
        + '<div class="resize-handle"></div>';
      card.style.width = '420px';
      wireDragResize(card);
    }

    if (card.classList.contains('card-text-type')) {
      wireDragResize(card);
    }
    canvas.appendChild(card);
    canvas.scrollTop = canvas.scrollHeight;
    wireCard(card);
  });

  // Pool global de z-index para manejo de capas
  var Z_TOP = 100;
  function wireCard(card) {
    card.querySelector('.del').onclick = () => card.remove();
    // ↑ = traer adelante (mayor z-index)
    card.querySelector('.up').onclick = () => {
      Z_TOP++;
      card.style.zIndex = Z_TOP;
    };
    // ↓ = enviar atrás (menor z-index)
    card.querySelector('.dn').onclick = () => {
      var minZ = Z_TOP;
      canvas.querySelectorAll('.card').forEach(function(c){
        var z = parseInt(c.style.zIndex || 100, 10);
        if (z < minZ) minZ = z;
      });
      card.style.zIndex = (minZ - 1);
    };
  }

  // === Importar imágenes al lienzo ===
  function importImageFile(file) {
    if (!file || !file.type || file.type.indexOf('image/') !== 0) return;

      counter++;

        + '</div><div class="card-snapshot"><img src="' + ev.target.result + '" style="width:100%;display:block"></div>'
        + '<div class="resize-handle"></div>';
      canvas.appendChild(card);
      wireDragResize(card);
      wireCard(card);
    };
    reader.readAsDataURL(file);
  }

  if (importBtn && importInput) {

    }
  };

  /* =====================================================================

  (function(){
    var monitorEl = document.getElementById('mtmMonitor');
    var logEl = document.getElementById('mtmMonitorLog');
    var jsonEl = document.getElementById('mtmMonitorJson');
    var countEl = document.getElementById('mtmMonitorCount');
    if (!monitorEl || !logEl || !jsonEl) return;

    var actions = [];

    var updateTimers = new WeakMap();
    var sessionId = 'mtm_' + new Date().toISOString().replace(/[-:.TZ]/g,'').slice(0,14);

    function ts(){ return new Date().toISOString(); }
    function shortTime(){ return new Date().toLocaleTimeString('es-ES',{hour12:false}); }
    function round(n){ return Math.round(Number(n || 0) * 1000) / 1000; }
    function safeText(el){ return (el && (el.textContent || el.value || '') || '').replace(/\s+/g,' ').trim().slice(0,80); }
    function cssPath(el){
      if (!el || !el.tagName) return '';
      if (el.id) return '#' + el.id;

      while (node && node.nodeType === 1 && parts.length < 4) {
        var p = node.tagName.toLowerCase();
        if (node.className && typeof node.className === 'string') p += '.' + node.className.trim().split(/\s+/).slice(0,2).join('.');
        parts.unshift(p); node = node.parentElement;

    function serializeDataset(el){

      }
      return card.dataset.mtmId;
    }
    function detectCardKind(card){
      if (!card) return 'unknown';
      if (card.dataset && card.dataset.mtmKind) return card.dataset.mtmKind;
      if (card.classList.contains('score-card-host') || card.querySelector('.score-card, #pentagramas, svg[data-score], svg .vf-stavenote')) return 'score';
      if (card.classList.contains('card-text-type') || card.querySelector('.card-text')) return 'text';
      if (card.querySelector('svg.circle-svg') || card.querySelector('.snap-stage svg')) return 'circle';
      if (card.querySelector('svg.fretboard, svg.mtm-fretboard-snapshot')) return 'fretboard';

    function getPianoLiveState(){

          out.state = JSON.parse(w.eval(`(function(){
            var o={};
            try{o.pressedNotes=(typeof pressedNotes!=='undefined')?Array.from(pressedNotes.keys?pressedNotes.keys():pressedNotes):[];}catch(e){}
            try{o.mouseNotes=(typeof mouseNotes!=='undefined')?Array.from(mouseNotes):[];}catch(e){}

    // Log específico de pestañas.
    document.querySelectorAll('.tab').forEach(function(t){
      t.addEventListener('click', function(){ setTimeout(function(){ log('tab.select', {tab:t.dataset.tab, title:safeText(t), activeTab:(typeof activeTab !== 'undefined' ? activeTab : null)}); }, 20); });
    });

    // Log selección/drag/resize/crop de tarjetas sin invadir la lógica existente.
    canvas?.addEventListener('mousedown', function(e){
      var card = e.target.closest('.card');
      if (!card) return;
      var kind = e.target.classList.contains('resize-handle') ? 'resize.start' : (e.target.classList.contains('crop-handle') ? 'crop.start' : 'card.pointerdown');
      log(kind, cardState(card));
    }, true);
    window.addEventListener('mouseup', function(){
      var selected = canvas ? canvas.querySelector('.card.selected') : null;
      if (selected) log('card.pointerup.finalState', cardState(selected));
    }, true);

    // MutationObserver: inserciones, borrados y cambios de estilo/class/dataset.
    var observer = new MutationObserver(function(list){
      list.forEach(function(m){
        if (m.type === 'childList') {
          Array.from(m.addedNodes || []).forEach(function(n){
            if (n.nodeType !== 1) return;
            var cards = n.matches && n.matches('.card') ? [n] : Array.from(n.querySelectorAll ? n.querySelectorAll('.card') : []);
            cards.forEach(function(card){ log('card.added', cardState(card)); });
          });
          Array.from(m.removedNodes || []).forEach(function(n){
            if (n.nodeType !== 1) return;
            if (n.matches && n.matches('.card')) log('card.removed', {cardId:n.dataset.mtmId || null, kind:detectCardKind(n)});
          });
        }
        if (m.type === 'attributes') {
          var card = m.target.closest && m.target.closest('.card');
          if (!card) return;
          if (updateTimers.has(card)) clearTimeout(updateTimers.get(card));
          updateTimers.set(card, setTimeout(function(){ log('card.updated.' + m.attributeName, cardState(card)); }, 180));
        }
      });
    });
    if (canvas) observer.observe(canvas, {childList:true, subtree:true, attributes:true, attributeFilter:['style','class','data-crop-left','data-crop-right','data-crop-left-ratio','data-crop-right-ratio','data-mtm-kind','data-mtm-id']});

    // Inyección de sensores en iframe de piano.
    function installPianoSensor(){
      try {
        var f = pianoFrame || document.getElementById('pianoFrame');
        var d = f && f.contentDocument;
        var w = f && f.contentWindow;
        if (!d || !w || d.__mtmMonitorInstalled) return;
        d.__mtmMonitorInstalled = true;
        d.addEventListener('click', function(e){
          var btn = e.target.closest && e.target.closest('button');
          if (btn) setTimeout(function(){ log('iframe.piano.button', {id:btn.id||null, text:safeText(btn), dataset:serializeDataset(btn), live:getPianoLiveState()}); }, 20);
        }, true);
        var pc = d.getElementById('piano-canvas');
        if (pc) {
          pc.addEventListener('pointerdown', function(e){
            var midi = null, xy = null;
            try {
              var r = pc.getBoundingClientRect();
              xy = {x:round((e.clientX-r.left)*(pc.width/r.width)), y:round((e.clientY-r.top)*(pc.height/r.height))};
              if (typeof w.midiAtPoint === 'function') midi = w.midiAtPoint(xy.x, xy.y);
            } catch(_) {}
            setTimeout(function(){ log('iframe.piano.pointerdown', {midi:midi, xy:xy, live:getPianoLiveState()}); }, 10);
          }, true);
        }
        log('iframe.piano.sensor.ready', getPianoLiveState());
      } catch(e) { log('iframe.piano.sensor.error', {error:String(e.message || e)}); }
    }
    function installFretboardSensor(){
      try {
        var f = fretboardFrame || document.getElementById('fretboardFrame');
        var d = f && f.contentDocument;
        if (!d || d.__mtmMonitorInstalled) return;
        d.__mtmMonitorInstalled = true;
        d.addEventListener('click', function(e){
          var btn = e.target.closest && e.target.closest('button');
          var svg = e.target.closest && e.target.closest('svg');
          var payload = {target:btn ? 'button' : (svg ? 'svg' : cssPath(e.target)), id:(btn&&btn.id)||null, text:btn?safeText(btn):safeText(e.target), dataset:btn?serializeDataset(btn):serializeDataset(e.target)};
          if (svg) {
            try {
              var r = svg.getBoundingClientRect();
              payload.svgPoint = {x:round(e.clientX-r.left), y:round(e.clientY-r.top), nx:round((e.clientX-r.left)/Math.max(1,r.width)), ny:round((e.clientY-r.top)/Math.max(1,r.height))};
            } catch(_) {}
          }
          setTimeout(function(){ payload.live = getFretboardLiveState(); log('iframe.fretboard.click', payload); }, 25);
        }, true);
        log('iframe.fretboard.sensor.ready', getFretboardLiveState());
      } catch(e) { log('iframe.fretboard.sensor.error', {error:String(e.message || e)}); }
    }
    if (pianoFrame) { pianoFrame.addEventListener('load', function(){ setTimeout(installPianoSensor, 150); }); setTimeout(installPianoSensor, 400); }
    if (fretboardFrame) { fretboardFrame.addEventListener('load', function(){ setTimeout(installFretboardSensor, 150); }); setTimeout(installFretboardSensor, 400); }

    window.MTM_MONITOR = {
      version:'mtm-monitor-v1', actions:actions, log:log,
      snapshot:canvasState, recording:recording, exportJson:function(){ return JSON.stringify(recording(), null, 2); },
      download:downloadJson, copy:copyJson, clear:clearLog,
      installPianoSensor:installPianoSensor, installFretboardSensor:installFretboardSensor
    };

    log('monitor.ready', {sessionId:sessionId, hint:'Usa MTM_MONITOR.exportJson() o el botón JSON para obtener la ruta reproducible.'});
    refreshJson();
  })();
</script>
</body>
</html>
