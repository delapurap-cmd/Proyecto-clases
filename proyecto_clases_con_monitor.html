t;,&quot;14,13,14,13,-1,-1&quot;,&quot;17,16,17,16,-1,-1&quot;,&quot;20,19,20,19,-1,-1&quot;],&quot;G&quot;:[&quot;3,2,3,2,-1,-1&quot;,&quot;-1,2,3,2,-1,3&quot;,&quot;6,5,6,5,-1,-1&quot;,&quot;9,8,9,8,-1,-1&quot;,&quot;-1,11,9,11,10,-1&quot;,&quot;12,11,12,11,-1,-1&quot;,&quot;-1,14,15,14,-1,15&quot;,&quot;15,14,15,14,-1,-1&quot;,&quot;18,17,18,17,-1,-1&quot;,&quot;21,20,21,20,-1,-1&quot;],&quot;G#&quot;:[&quot;1,0,1,0,-1,-1&quot;,&quot;4,3,4,3,-1,-1&quot;,&quot;-1,3,4,3,-1,4&quot;,&quot;7,6,7,6,-1,-1&quot;,&quot;10,9,10,9,-1,-1&quot;,&quot;-1,12,10,12,11,-1&quot;,&quot;13,12,13,12,-1,-1&quot;,&quot;-1,15,16,15,-1,16&quot;,&quot;16,15,16,15,-1,-1&quot;,&quot;19,18,19,18,-1,-1&quot;],&quot;A&quot;:[&quot;2,1,-1,1,0,-1&quot;,&quot;2,1,2,1,-1,-1&quot;,&quot;5,4,5,4,-1,-1&quot;,&quot;-1,4,5,4,-1,5&quot;,&quot;8,7,8,7,-1,-1&quot;,&quot;11,10,11,10,-1,-1&quot;,&quot;-1,13,11,13,12,-1&quot;,&quot;14,13,14,13,-1,-1&quot;,&quot;-1,16,17,16,-1,17&quot;,&quot;17,16,17,16,-1,-1&quot;,&quot;20,19,20,19,-1,-1&quot;],&quot;A#&quot;:[&quot;-1,2,0,2,1,-1&quot;,&quot;3,2,3,2,-1,-1&quot;,&quot;6,5,6,5,-1,-1&quot;,&quot;-1,5,6,5,-1,6&quot;,&quot;9,8,9,8,-1,-1&quot;,&quot;12,11,12,11,-1,-1&quot;,&quot;-1,14,12,14,13,-1&quot;,&quot;15,14,15,14,-1,-1&quot;,&quot;-1,17,18,17,-1,18&quot;,&quot;18,17,18,17,-1,-1&quot;,&quot;21,20,21,20,-1,-1&quot;],&quot;B&quot;:[&quot;1,0,1,0,-1,-1&quot;,&quot;-1,3,1,3,2,-1&quot;,&quot;4,3,4,3,-1,-1&quot;,&quot;-1,6,7,6,-1,7&quot;,&quot;7,6,7,6,-1,-1&quot;,&quot;10,9,10,9,-1,-1&quot;,&quot;13,12,13,12,-1,-1&quot;,&quot;-1,15,13,15,14,-1&quot;,&quot;16,15,16,15,-1,-1&quot;,&quot;-1,18,19,18,-1,19&quot;,&quot;19,18,19,18,-1,-1&quot;,&quot;22,21,22,21,-1,-1&quot;]}};

/* =========================================================================
   CONSTANTES VISUALES
   ========================================================================= */
const NUM_FRETS   = 22;
const NUT_WIDTH   = 16;
const DECAY_RATIO = 0.94;
const NUM_STRINGS = 6;
const STRING_RAIL_GUTTER = 34;
const BOARD_TOP_PAD = 10;
const BOARD_BOTTOM_PAD = 6;
const LABELS_BAND_H = 18;
const FRETBOARD_LENGTH_RATIO = 2 / 3;
const BASE_ASPECT_RATIO = 7.2;

const TUNING = ['E', 'B', 'G', 'D', 'A', 'E'];
const NOTES  = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const FRET_MARKERS = { 3:1, 5:1, 7:1, 9:1, 12:2, 15:1, 17:1, 19:1, 21:1 };
const FRET_NUMBERS = [3, 5, 7, 9, 12, 15, 17, 19, 21, 22];

const COLORS = {
  nut:        '#F5F5DC',
  fretShadow: 'rgba(0,0,0,0.55)',
  fretMain:   '#505050',
  fretShine:  'rgba(185,185,185,0.45)',
  string:     '#E5E7EB',
  marker:     'rgba(255,255,255,0.72)',

  rootFill:   '#C9A84C',
  rootText:   '#FFF8E1',
  rootGlow:   '#E8C97A',
  activeFill: '#D4C46A',
  activeText: '#1B1406',
  ghostFill:  'rgba(201, 168, 76, 0.3)',
  ghostText:  'rgba(240, 220, 160, 0.55)',
  mute:       '#999',
  stringLabel:     'rgba(220,220,220,0.55)',
  stringLabelRoot: '#D4C46A',
};

/* =========================================================================
   TIPOS
   ========================================================================= */
const SCALE_TYPES = [
  { label: 'Mayor',       labelKey: 'fret.embed.type.major',      dbKey: 'Mayor' },
  { label: 'Pentatónica', labelKey: 'fret.embed.type.pentatonic', dbKey: 'Pentatónica' },
];
const CHORD_TYPES = [
  { label: 'Mayor', labelKey: 'fret.embed.type.major', dbKey: 'Mayor' },
  { label: 'Menor', labelKey: 'fret.embed.type.minor', dbKey: 'Menor' },
  { label: 'Maj7',  labelKey: 'fret.embed.type.maj7',  dbKey: 'Maj7'  },
  { label: 'dim7',  labelKey: 'fret.embed.type.dim7',  dbKey: 'dim7'  },
];

/* =========================================================================
   ESTADO
   ========================================================================= */
const state = {
  mode: 'scale',
  rootIdx: NOTES.indexOf('C'),
  scaleTypeIdx: 0,
  chordTypeIdx: 0,
  boxIdx: 4,
};

const SUPPORTED_LANGS = ['es', 'en', 'fr', 'it', 'pt'];
let uiLang = 'es';

function resolveLang(lang) {
  return SUPPORTED_LANGS.includes(lang) ? lang : 'es';
}

function tEmbed(key, fallback) {
  const table = window.MTM_TRANSLATIONS || {};
  const row = table[key] || {};
  return row[uiLang] || row.en || fallback;
}

function refreshTypeLabels() {
  SCALE_TYPES.forEach(type => {
    type.label = tEmbed(type.labelKey, type.label);
  });
  CHORD_TYPES.forEach(type => {
    type.label = tEmbed(type.labelKey, type.label);
  });
}

function refreshCarouselTrackLabels(trackId, items) {
  const track = document.getElementById(trackId);
  if (!track) return;
  const nodes = track.children;
  const size = items.length;
  for (let i = 0; i < nodes.length; i++) {
    nodes[i].textContent = items[i % size].label;
  }
}

function applyEmbeddedLanguage(lang) {
  uiLang = resolveLang(lang || localStorage.getItem('mtm-lang') || 'es');
  localStorage.setItem('mtm-lang', uiLang);
  document.documentElement.lang = uiLang;

  const scaleBtn = document.getElementById('modeScaleBtn');
  const chordBtn = document.getElementById('modeChordBtn');
  if (scaleBtn) scaleBtn.textContent = tEmbed('fret.embed.scale', 'Escalas');
  if (chordBtn) chordBtn.textContent = tEmbed('fret.embed.chord', 'Acordes');

  refreshTypeLabels();
  refreshCarouselTrackLabels('scaleTypeTrack', SCALE_TYPES);
  refreshCarouselTrackLabels('chordTypeTrack', CHORD_TYPES);
  updateSelectionReadout();
}

function currentRoot() { return NOTES[state.rootIdx]; }
function currentType() {
  return state.mode === 'scale'
    ? SCALE_TYPES[state.scaleTypeIdx]
    : CHORD_TYPES[state.chordTypeIdx];
}

function currentSelectionLabel() {
  const type = currentType();
  return `${currentRoot()} ${type.label}`;
}

function updateSelectionReadout() {
  const label = currentSelectionLabel();
  const readout = document.getElementById('selectionReadoutValue');
  const readoutWrap = document.querySelector('.selection-readout');
  const visible = true;
  if (readoutWrap) readoutWrap.classList.toggle('hidden', !visible);
  if (readout) readout.textContent = label;
}

/* =========================================================================
   PARSING JSON
   ========================================================================= */
function parseScaleBox(str) {
  return str.split(',').map(tok => {
    const [s, f] = tok.split('_').map(Number);
    return { string: s, fret: f };
  });
}
function parseChordShape(str) {
  return str.split(',').map(Number).map((fret, s) => ({ string: s, fret }));
}

function getActiveData() {
  const t = currentType();
  const root = currentRoot();
  if (state.mode === 'scale') {
    const raw = (SCALE_DB[t.dbKey] || {})[root] || [];
    const boxes = raw.map(parseScaleBox);
    const idx = Math.min(state.boxIdx, Math.max(0, boxes.length - 1));
    return { mode: 'scale', boxes, current: boxes[idx] || [], count: boxes.length };
  } else {
    const raw = (CHORD_DB[t.dbKey] || {})[root] || [];
    const shapes = raw.map(parseChordShape);
    const idx = Math.min(state.boxIdx, Math.max(0, shapes.length - 1));
    return { mode: 'chord', shapes, current: shapes[idx] || [], count: shapes.length };
  }
}

/* =========================================================================
   FRETBOARD RENDER
   ========================================================================= */
function computeFretX(W, boardX) {
  const fretX = [boardX + NUT_WIDTH];
  const avail = W - boardX - NUT_WIDTH;
  let sumRatios = 0;
  for (let i = 0; i < NUM_FRETS; i++) sumRatios += Math.pow(DECAY_RATIO, i);
  const initialFW = avail / sumRatios;
  let cur = boardX + NUT_WIDTH;
  for (let i = 0; i < NUM_FRETS; i++) {
    cur += initialFW * Math.pow(DECAY_RATIO, i);
    fretX.push(cur);
  }
  return fretX;
}

function renderFretboard() {
  const svg = document.getElementById('fretboard');
  const wrapper = svg.parentElement;
  const rail = document.getElementById('stringRail');
  const viewportW = wrapper.clientWidth;
  const H = wrapper.clientHeight;
  const minW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fretboard-min-w')) || 613;
  const railWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--string-rail-w')) || STRING_RAIL_GUTTER;
  const boardX = railWidth;
  const W = Math.max(viewportW + boardX, Math.round(H * BASE_ASPECT_RATIO * FRETBOARD_LENGTH_RATIO) + boardX, minW + boardX);
  const boardY = BOARD_TOP_PAD;
  const boardH = Math.max(48, H - BOARD_TOP_PAD - BOARD_BOTTOM_PAD - LABELS_BAND_H);
  const markerY = boardY + boardH + Math.max(9, LABELS_BAND_H * 0.62);
  const markerFontSize = Math.max(8, Math.min(12, boardH * 0.12));

  svg.style.width = `${W}px`;
  svg.style.height = `${H}px`;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';

  const defs = svgEl('defs');
  defs.innerHTML = `
    <linearGradient id=&quot;rosewood&quot; x1=&quot;0%&quot; y1=&quot;0%&quot; x2=&quot;0%&quot; y2=&quot;100%&quot;>
      <stop offset=&quot;0%&quot;   stop-color=&quot;#2D1B15&quot;/>
      <stop offset=&quot;45%&quot;  stop-color=&quot;#6D4C41&quot;/>
      <stop offset=&quot;100%&quot; stop-color=&quot;#3E2723&quot;/>
    </linearGradient>
    <filter id=&quot;glow&quot; x=&quot;-50%&quot; y=&quot;-50%&quot; width=&quot;200%&quot; height=&quot;200%&quot;>
      <feGaussianBlur stdDeviation=&quot;3.5&quot; result=&quot;b&quot;/>
      <feMerge><feMergeNode in=&quot;b&quot;/><feMergeNode in=&quot;SourceGraphic&quot;/></feMerge>
    </filter>
  `;
  svg.appendChild(defs);

  const fretX = computeFretX(W, boardX);
  const stringSpacing = boardH / NUM_STRINGS;
  const noteMetrics = getNoteMetrics(stringSpacing);

  svg.appendChild(svgRect(boardX, boardY, W - boardX, boardH, 'url(#rosewood)', { rx: 8, ry: 8 }));
  svg.appendChild(svgRect(boardX, boardY, NUT_WIDTH, boardH, COLORS.nut, { rx: 4, ry: 4 }));

  for (let i = 0; i < NUM_FRETS; i++) {
    const x = fretX[i + 1];
    svg.appendChild(svgLine(x + 1.5, boardY, x + 1.5, boardY + boardH, COLORS.fretShadow, 2));
    svg.appendChild(svgLine(x, boardY, x, boardY + boardH, COLORS.fretMain, 3));
    svg.appendChild(svgLine(x, boardY, x, boardY + boardH, COLORS.fretShine, 1));
  }

  for (let i = 0; i < NUM_FRETS; i++) {
    const fn = i + 1;
    if (!FRET_NUMBERS.includes(fn)) continue;
    const cx = (fretX[i] + fretX[i + 1]) / 2;
    const marker = svgText(cx, markerY, fn, COLORS.marker, markerFontSize, 'middle', 700);
    marker.setAttribute('opacity', '0.78');
    svg.appendChild(marker);
  }

  for (let i = 0; i < NUM_STRINGS; i++) {
    const y = boardY + i * stringSpacing + stringSpacing / 2;
    const sw = 1.0 + (i * 0.2);
    svg.appendChild(svgLine(boardX, y + 1, W, y + 1, 'rgba(0,0,0,0.35)', sw));
    svg.appendChild(svgLine(boardX, y, W, y, COLORS.string, sw));
  }

  renderStringRail(rail, stringSpacing, boardY);

  const notesGroup = svgEl('g');
  const data = getActiveData();
  const rootName = currentRoot();

  if (data.mode === 'scale') {
    const activeSet = new Set(data.current.map(p => `${p.string}_${p.fret}`));
    const allSet = new Set();
    data.boxes.forEach(b => b.forEach(p => allSet.add(`${p.string}_${p.fret}`)));
    allSet.forEach(key => {
      const [s, f] = key.split('_').map(Number);
      const pos = getPos(s, f, fretX, stringSpacing, boardY);
      const noteName = noteAt(s, f);
      const isRoot = noteName === rootName;
      const isActive = activeSet.has(key);
      drawNote(notesGroup, pos.cx, pos.cy, noteName, isRoot, isActive ? 'active' : 'ghost', noteMetrics);
    });
  } else {
    data.current.forEach(p => {
      if (p.fret === -1) {
        const y = boardY + p.string * stringSpacing + stringSpacing / 2;
        notesGroup.appendChild(svgText(boardX + (NUT_WIDTH / 2), y, '×', COLORS.mute, 14, 'middle', 700));
        return;
      }
      const pos = getPos(p.string, p.fret, fretX, stringSpacing, boardY);
      const noteName = noteAt(p.string, p.fret);
      const isRoot = noteName === rootName;
      drawNote(notesGroup, pos.cx, pos.cy, noteName, isRoot, 'active', noteMetrics);
    });
  }
  svg.appendChild(notesGroup);

  centerActiveSelection(wrapper, data, fretX, stringSpacing, boardY, W, boardX);
}

function renderStringRail(rail, stringSpacing, boardY) {
  rail.innerHTML = '';
  for (let i = 0; i < NUM_STRINGS; i++) {
    const y = boardY + i * stringSpacing + stringSpacing / 2;
    const openNote = TUNING[i];
    const isRoot = openNote === currentRoot();
    const note = document.createElement('div');
    note.className = `string-rail-note${isRoot ? ' root' : ''}`;
    note.textContent = openNote;
    note.style.top = `${y}px`;
    rail.appendChild(note);
  }
}

function getPos(stringIdx, fret, fretX, stringSpacing, boardY = 0) {
  let cx;
  if (fret === 0) cx = fretX[0] - (NUT_WIDTH / 2);
  else cx = (fretX[fret - 1] + fretX[fret]) / 2;
  const cy = boardY + stringIdx * stringSpacing + stringSpacing / 2;
  return { cx, cy };
}
function noteAt(stringIdx, fret) {
  const openIdx = NOTES.indexOf(TUNING[stringIdx]);
  return NOTES[(openIdx + fret) % 12];
}

function getNoteMetrics(stringSpacing) {
  const radius = Math.max(7, Math.min(18, (stringSpacing * 0.5) - 1));
  const textSize = Math.max(8, Math.min(14, radius * 0.95));
  const rootTextSize = Math.max(9, Math.min(15, radius));
  return { radius, textSize, rootTextSize };
}

function drawNote(parent, cx, cy, text, isRoot, kind, metrics) {
  const { radius, textSize, rootTextSize } = metrics;
  if (kind === 'ghost') {
    parent.appendChild(svgCircle(cx, cy, radius, COLORS.ghostFill));
    parent.appendChild(svgText(cx, cy, text, COLORS.ghostText, textSize, 'middle', 700));
    return;
  }
  if (isRoot) {
    const halo = svgCircle(cx, cy, radius, COLORS.rootGlow, 0.55);
    halo.setAttribute('filter', 'url(#glow)');
    parent.appendChild(halo);
    parent.appendChild(svgCircle(cx, cy, radius, COLORS.rootFill));
    parent.appendChild(svgText(cx, cy, text, COLORS.rootText, rootTextSize, 'middle', 800));
  } else {
    parent.appendChild(svgCircle(cx, cy, radius, COLORS.activeFill));
    parent.appendChild(svgText(cx, cy, text, COLORS.activeText, textSize, 'middle', 800));
  }
}

function centerActiveSelection(wrapper, data, fretX, stringSpacing, boardY, boardW, boardX) {
  const currentPoints = data.mode === 'scale'
    ? data.current
    : data.current.filter(point => point.fret >= 0);

  if (currentPoints.length === 0) return;

  const positions = currentPoints.map(point => getPos(point.string, point.fret, fretX, stringSpacing, boardY));
  const minX = Math.min(...positions.map(point => point.cx));
  const maxX = Math.max(...positions.map(point => point.cx));
  const centerX = (minX + maxX) / 2;
  const viewportW = wrapper.clientWidth;
  const visibleBoardWidth = viewportW - boardX;
  const targetScrollLeft = Math.max(0, Math.min(boardW - viewportW, centerX - (boardX + (visibleBoardWidth / 2))));

  wrapper.scrollTo({ left: targetScrollLeft, behavior: 'smooth' });
}

/* =========================================================================
   SVG HELPERS
   ========================================================================= */
function svgEl(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }
function svgRect(x,y,w,h,fill,extra={}) {
  const r = svgEl('rect');
  r.setAttribute('x',x); r.setAttribute('y',y);
  r.setAttribute('width',w); r.setAttribute('height',h);
  r.setAttribute('fill',fill);
  for (const k in extra) r.setAttribute(k, extra[k]);
  return r;
}
function svgLine(x1,y1,x2,y2,stroke,w) {
  const l = svgEl('line');
  l.setAttribute('x1',x1); l.setAttribute('y1',y1);
  l.setAttribute('x2',x2); l.setAttribute('y2',y2);
  l.setAttribute('stroke',stroke); l.setAttribute('stroke-width',w);
  l.setAttribute('stroke-linecap','round');
  return l;
}
function svgCircle(cx,cy,r,fill,opacity=1) {
  const c = svgEl('circle');
  c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',r);
  c.setAttribute('fill',fill);
  if (opacity !== 1) c.setAttribute('opacity', opacity);
  return c;
}
function svgText(x,y,text,fill,size,anchor='middle',weight=400) {
  const t = svgEl('text');
  t.setAttribute('x',x); t.setAttribute('y',y);
  t.setAttribute('fill',fill); t.setAttribute('font-size',size);
  t.setAttribute('font-family','Inter, -apple-system, sans-serif');
  t.setAttribute('font-weight',weight);
  t.setAttribute('text-anchor',anchor);
  t.setAttribute('dominant-baseline','central');
  t.textContent = text;
  return t;
}

/* =========================================================================
   CAROUSEL COMPONENTS (HORIZONTAL &amp; VERTICAL)
   Looping infinito (clonado 3x) + efecto wheel (scale+opacity por distancia)
   ========================================================================= */
function buildCarousel({ trackEl, items, initialIdx, onChange, orientation, itemSize, vpSize }) {
  const viewport = trackEl.parentElement;
  const VP_SIZE = vpSize;
  const ITEM_SIZE = itemSize;
  const N = items.length;
  const renderItems = [...items, ...items, ...items];
  let selectedIdx = initialIdx;

  trackEl.innerHTML = '';
  renderItems.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = orientation === 'h' ? 'hcarousel-item' : 'vcarousel-item';
    if (orientation === 'h') el.style.width  = ITEM_SIZE + 'px';
    else                     el.style.height = ITEM_SIZE + 'px';
    el.textContent = typeof item === 'object' ? item.label : item;
    el.addEventListener('click', () => {
      const realIdx = i % N;
      if (realIdx !== selectedIdx) setIndex(realIdx);
    });
    trackEl.appendChild(el);
  });

  function updatePosition() {
    const centerVirtual = N + selectedIdx;
    const targetOffset = -(centerVirtual * ITEM_SIZE) + (VP_SIZE / 2) - (ITEM_SIZE / 2);
    trackEl.style.transform = orientation === 'h'
      ? `translateX(${targetOffset}px)`
      : `translateY(${targetOffset}px)`;

    Array.from(trackEl.children).forEach((el, i) => {
      const dist = Math.abs(i - centerVirtual);
      let scale, opacity;
      if      (dist === 0) { scale = 1.00; opacity = 1.00; }
      else if (dist === 1) { scale = 0.85; opacity = 0.55; }
      else if (dist === 2) { scale = 0.70; opacity = 0.25; }
      else                 { scale = 0.55; opacity = 0.00; }
      el.style.transform = `scale(${scale})`;
      el.style.opacity = opacity;
      el.classList.toggle('selected', dist === 0);
    });
  }

  function setIndex(idx) {
    selectedIdx = ((idx % N) + N) % N;
    updatePosition();
    if (onChange) onChange(selectedIdx);
  }
  function next() { setIndex(selectedIdx + 1); }
  function prev() { setIndex(selectedIdx - 1); }

  // Wheel
  let wheelLock = false;
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (wheelLock) return;
    wheelLock = true;
    setTimeout(() => wheelLock = false, 180);
    const d = orientation === 'h' ? e.deltaX || e.deltaY : e.deltaY;
    if (d > 0) next(); else prev();
  }, { passive: false });

  // Touch swipe
  let tStart = null;
  viewport.addEventListener('touchstart', (e) => {
    tStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  viewport.addEventListener('touchend', (e) => {
    if (!tStart) return;
    const dx = e.changedTouches[0].clientX - tStart.x;
    const dy = e.changedTouches[0].clientY - tStart.y;
    const d = orientation === 'h' ? dx : dy;
    if (Math.abs(d) > 25) { if (d < 0) next(); else prev(); }
    tStart = null;
  });

  trackEl.style.transition = 'none';
  updatePosition();
  trackEl.offsetHeight;
  trackEl.style.transition = '';

  return { next, prev, setIndex, get index() { return selectedIdx; } };
}

/* =========================================================================
   INIT CAROUSELS
   ========================================================================= */
let rootCarousel, scaleTypeCarousel, chordTypeCarousel;

function onRootChange(idx)      { state.rootIdx = idx;       state.boxIdx = 0; updateBoxDisplay(); updateSelectionReadout(); renderFretboard(); }
function onScaleTypeChange(idx) { state.scaleTypeIdx = idx;  state.boxIdx = 0; updateBoxDisplay(); updateSelectionReadout(); renderFretboard(); }
function onChordTypeChange(idx) { state.chordTypeIdx = idx;  state.boxIdx = 0; updateBoxDisplay(); updateSelectionReadout(); renderFretboard(); }

function initCarousels() {
  const styles = getComputedStyle(document.documentElement);
  const rootItemSize = parseFloat(styles.getPropertyValue('--root-item-size')) || 44;
  const typeItemSize = parseFloat(styles.getPropertyValue('--type-item-size')) || 32;

  // Measure the REAL inner dimensions (clientWidth excludes border)
  // so the centering math lands exactly on the visual center.
  const hcarouselEl = document.getElementById('rootCarousel');
  const scaleVcEl   = document.getElementById('scaleTypeCarousel');
  const hcarouselW  = hcarouselEl.clientWidth;
  const vcarouselH  = scaleVcEl.clientHeight;

  rootCarousel = buildCarousel({
    trackEl:  document.getElementById('rootTrack'),
    items:    NOTES,
    initialIdx: state.rootIdx,
    onChange: onRootChange,
    orientation: 'h',
    itemSize: rootItemSize,
    vpSize:   hcarouselW,
  });
  scaleTypeCarousel = buildCarousel({
    trackEl:  document.getElementById('scaleTypeTrack'),
    items:    SCALE_TYPES,
    initialIdx: state.scaleTypeIdx,
    onChange: onScaleTypeChange,
    orientation: 'v',
    itemSize: typeItemSize,
    vpSize:   vcarouselH,
  });
  // chordType is hidden at init — use scale's measurement since styling is identical
  chordTypeCarousel = buildCarousel({
    trackEl:  document.getElementById('chordTypeTrack'),
    items:    CHORD_TYPES,
    initialIdx: state.chordTypeIdx,
    onChange: onChordTypeChange,
    orientation: 'v',
    itemSize: typeItemSize,
    vpSize:   vcarouselH,
  });
}

/* =========================================================================
   BOX SELECTOR
   ========================================================================= */
function updateBoxDisplay() {
  const data = getActiveData();
  const n = Math.max(1, data.count);
  if (state.boxIdx >= n) state.boxIdx = 0;
  document.getElementById('boxNumber').textContent = state.boxIdx + 1;
}
document.getElementById('boxPrev').onclick = () => {
  const data = getActiveData();
  if (data.count === 0) return;
  state.boxIdx = (state.boxIdx - 1 + data.count) % data.count;
  updateBoxDisplay();
  updateSelectionReadout();
  renderFretboard();
};
document.getElementById('boxNext').onclick = () => {
  const data = getActiveData();
  if (data.count === 0) return;
  state.boxIdx = (state.boxIdx + 1) % data.count;
  updateBoxDisplay();
  updateSelectionReadout();
  renderFretboard();
};

/* =========================================================================
  TYPE CAROUSEL HELPERS
  ========================================================================= */
function activeTypeCarousel() {
  return state.mode === 'scale' ? scaleTypeCarousel : chordTypeCarousel;
}

/* =========================================================================
   MODE TOGGLE
   ========================================================================= */
document.querySelectorAll('#modeToggle button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#modeToggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    state.boxIdx = 0;
    document.getElementById('scaleTypeCarousel').style.display = state.mode === 'scale' ? '' : 'none';
    document.getElementById('chordTypeCarousel').style.display = state.mode === 'chord' ? '' : 'none';
    updateBoxDisplay();
    updateSelectionReadout();
    renderFretboard();
  };
});

/* =========================================================================
   KEYBOARD
   ========================================================================= */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft')  document.getElementById('boxPrev').click();
  if (e.key === 'ArrowRight') document.getElementById('boxNext').click();
  if (e.key === 'ArrowUp')    activeTypeCarousel().prev();
  if (e.key === 'ArrowDown')  activeTypeCarousel().next();
});

window.addEventListener('resize', renderFretboard);

window.addEventListener('message', (event) => {
  const data = event.data;
  if (!data || data.type !== 'mtm-lang') return;
  applyEmbeddedLanguage(data.lang);
});

/* ===== BOOT ===== */
applyEmbeddedLanguage(localStorage.getItem('mtm-lang'));
initCarousels();
updateBoxDisplay();
updateSelectionReadout();
renderFretboard();
</script>

// MODELO MUSICAL (idéntico a circle_harmony_models.dart)

const SEGMENT_ANGLE = 30; // 360 / 12

  { major: 'C',  minor: 'Am',  index: 0  },
  { major: 'G',  minor: 'Em',  index: 1  },
  { major: 'D',  minor: 'Bm',  index: 2  },

  'C': [], 'G': ['F♯'], 'D': ['F♯','C♯'], 'A': ['F♯','C♯','G♯'],
  'E': ['F♯','C♯','G♯','D♯'], 'B': ['F♯','C♯','G♯','D♯','A♯'],
  'F♯': ['F♯','C♯','G♯','D♯','A♯','E♯'],
  'D♭': ['B♭','E♭','A♭','D♭','G♭'], 'A♭': ['B♭','E♭','A♭','D♭'],
  'E♭': ['B♭','E♭','A♭'], 'B♭': ['B♭','E♭'], 'F': ['B♭'],
  'Am':[],'Em':['F♯'],'Bm':['F♯','C♯'],'F♯m':['F♯','C♯','G♯'],
  'C♯m':['F♯','C♯','G♯','D♯'],'G♯m':['F♯','C♯','G♯','D♯','A♯'],
  'D♯m':['F♯','C♯','G♯','D♯','A♯','E♯'],
  'B♭m':['B♭','E♭','A♭','D♭','G♭'],'Fm':['B♭','E♭','A♭','D♭'],

// Patrones diatónicos
const majorPattern  = [0,11,1,11,1,0,2];
const majorIsMajor  = [true,false,false,true,true,false,false];

const minorIsMajor  = [false,false,true,false,false,true,true];
const minorIsDimin  = [false,true,false,false,false,false,false];

const modeNamesByLang = {

  en: ['Ionian','Dorian','Phrygian','Lydian','Mixolydian','Aeolian','Locrian'],
  fr: ['Ionien','Dorien','Phrygien','Lydien','Mixolydien','Éolien','Locrien'],
  it: ['Ionico','Dorico','Frigio','Lidio','Misolidio','Eolio','Locrio'],
  pt: ['Jônico','Dórico','Frígio','Lídio','Mixolídio','Eólio','Lócrio'],
};
const circleButtonLabelsByLang = {
  es: {
    custom: 'CUSTOM', mode: 'MODE', themes: 'TEMAS', degrees: 'GRADOS',
    negative: 'NEG E<>E♭', negativeSingle: 'NEG 1', transposeUp: '+1', transposeDown: '-1',
    notation: 'ABC', resetTranspose: 'TRANSP'
  },
  en: {
    custom: 'CUSTOM', mode: 'MODE', themes: 'THEMES', degrees: 'DEGREES',
    negative: 'NEG E<>E♭', negativeSingle: 'NEG 1', transposeUp: '+1', transposeDown: '-1',
    notation: 'ABC', resetTranspose: 'TRANSP'
  },
  fr: {
    custom: 'CUSTOM', mode: 'MODE', themes: 'THEMES', degrees: 'DEGRÉS',
    negative: 'NEG E<>E♭', negativeSingle: 'NEG 1', transposeUp: '+1', transposeDown: '-1',
    notation: 'ABC', resetTranspose: 'TRANSP'
  },
  it: {
    custom: 'CUSTOM', mode: 'MODE', themes: 'TEMI', degrees: 'GRADI',
    negative: 'NEG E<>E♭', negativeSingle: 'NEG 1', transposeUp: '+1', transposeDown: '-1',
    notation: 'ABC', resetTranspose: 'TRASP'
  },
  pt: {
    custom: 'CUSTOM', mode: 'MODE', themes: 'TEMAS', degrees: 'GRAUS',
    negative: 'NEG E<>E♭', negativeSingle: 'NEG 1', transposeUp: '+1', transposeDown: '-1',
    notation: 'ABC', resetTranspose: 'TRANSP'
  },
};

function getCircleLang() {
  const lang = localStorage.getItem('mtm-lang') || 'es';
  return ['es', 'en', 'fr', 'it', 'pt'].includes(lang) ? lang : 'es';
}

function getModeNames() {
  return modeNamesByLang[getCircleLang()] || modeNamesByLang.es;
}

function getCircleButtonLabel(key) {
  const langLabels = circleButtonLabelsByLang[getCircleLang()] || circleButtonLabelsByLang.es;
  return langLabels[key] || key;
}
const modeParentOffsets = [0,10,8,1,11,9,7];

// Mapa Anglo -> Latino
const angloToLatin = {
  'C':'Do','D':'Re','E':'Mi','F':'Fa','G':'Sol','A':'La','B':'Si',
  'C♯':'Do♯','D♯':'Re♯','F♯':'Fa♯','G♯':'Sol♯','A♯':'La♯',
  'D♭':'Re♭','E♭':'Mi♭','G♭':'Sol♭','A♭':'La♭','B♭':'Si♭',
};
function toLatin(text) {
  // Reemplaza la nota raíz preservando sufijos como 'm', '°'
  // Maneja notas con alteraciones (♯/♭) primero
  const sortedKeys = Object.keys(angloToLatin).sort((a,b) => b.length - a.length);
  for (const k of sortedKeys) {
    if (text.startsWith(k)) {
      return angloToLatin[k] + text.substring(k.length);
    }
  }
  return text;
}

// =====================================================
// ESTADO
// =====================================================
const state = {
  selectedKeyId: 'M-C',
  anchorKeyId: 'M-C',          // tonalidad de referencia para el transport
  anchorIlluminated: null,     // snapshot del shape iluminado al fijar ancla
  anchorHighlightOrder: null,
  harmonyList: [],
  illuminatedKeys: new Set(), // CUSTOM mode
  highlightOrder: [],          // Orden para flechas
  isCustomMode: false,
  activeModeIndex: -1,         // -1 = off
  modeKeys: new Set(),
  dimModeKeys: new Set(),
  modeTonicKeyId: null,        // tónica del modo paralelo (a destacar)
  useRomanNumerals: true,      // GRADOS toggle (true = I-V, false = 1-5)
  useLatinNotation: false,     // Notación de notas
  transposeValue: 0,
  theme: 'flat',
  // --- Armonía negativa ---
  isNegativeActive: false,     // NEG (bottomLeft): refleja toda la progresión
  negativeBackupOrder: null,   // backup del highlightOrder original
  negativeBackupIlluminated: null,
  isNegativeSingleArmed: false,// NEG·1 (bottomCenterLeft): modo armado para reflejar uno
  negativeSingleFlipped: new Map(), // Map de keyId actual → keyId original (para revertir)
  // Estado cíclico de los botones NEG y NEG·1: 0 = off, 1 = Paralela, 2 = Collier
  negativeState: 0,
  negativeSingleState: 0,
};

// =====================================================
// ARMONÍA NEGATIVA
// =====================================================
// Convierte una raíz cromática (0..11) y una calidad a un keyId válido.
// Mayor: busca el slot i tal que (i*7)%12 == chromaticRoot.
// Menor: busca el slot i tal que ((i+3)*7)%12 == chromaticRoot
//        (porque la tónica del menor está 3 slots adelante en el COQ).
function chromaticRootToKeyId(chromaticRoot, isMajor) {
  for (let i = 0; i < musicalKeys.length; i++) {
    if (isMajor) {
      if ((i * 7) % 12 === chromaticRoot) return musicalKeys[i].majorId;
    } else {
      if (((i + 3) * 7) % 12 === chromaticRoot) return musicalKeys[i].minorId;
    }
  }
  return null;
}

// Obtiene la raíz cromática (0..11) de cualquier keyId.
// Mayor: chroma = (slotIndex * 7) % 12.
// Menor: la tónica del menor está 3 slots más adelante en el COQ que su slot,
//        por lo que chroma = ((slotIndex + 3) * 7) % 12.
// (Ejemplo: Am está en slot 0 pero su tónica A está en slot 3, chroma=9)
function getChromaticRoot(keyId) {
  const isMajor = keyId.startsWith('M-');
  const name = keyId.substring(2);
  for (let i = 0; i < musicalKeys.length; i++) {
    if (isMajor) {
      if (musicalKeys[i].major === name) return (i * 7) % 12;
    } else {
      if (musicalKeys[i].minor === name) return ((i + 3) * 7) % 12;
    }
  }
  return 0;
}

// --- REGLA 1: EJE CLÁSICO (Levy/Collier) ---
// Espejo cromático alrededor de la tónica de referencia (state.selectedKeyId).
// Fórmula: newRoot = (2 * tonicRoot - root) mod 12, con calidad invertida.
// Ejemplos con tónica C (tonicRoot=0):
//   C(0)→C(0)m, Dm(2)→Bb(10), Em(4)→Ab(8), F(5)→Gm(7), G(7)→Fm(5), Am(9)→Eb(3)
// Ejemplos con tónica F (tonicRoot=5):
//   F(5)→Fm(5), Gm(7)→Eb(3), C(0)→Bb(10), Dm(2)→Ab(8), Bb(10)→Cm(0)
function classicNegativeOf(keyId) {
  const root = getChromaticRoot(keyId);
  // Determinar la tónica de referencia: la tonalidad seleccionada actual
  var tonicRoot = 0;
  if (state.selectedKeyId) {
    tonicRoot = getChromaticRoot(state.selectedKeyId);
  }
  const newRoot = ((2 * tonicRoot - root) % 12 + 12) % 12;
  const wasMajor = keyId.startsWith('M-');
  return chromaticRootToKeyId(newRoot, !wasMajor) || keyId;
}

// --- REGLA 2: EJE DE TÓNICA (espejo entre F y C) ---
// Espejo cromático alrededor del punto medio entre F(5) y C(0):
//   nueva_raíz = (5 - raíz) mod 12  →  0→5, 2→3, 4→1, 5→0, 7→10, 9→8
// Calidad invertida (mayor↔menor).
// Resultados: C→Fm, Dm→Eb, Em→Db, F→Cm, G→Bbm, Am→Ab
function tonicNegativeOf(keyId) {
  const root = getChromaticRoot(keyId);
  const newRoot = ((5 - root) % 12 + 12) % 12;
  const wasMajor = keyId.startsWith('M-');
  return chromaticRootToKeyId(newRoot, !wasMajor) || keyId;
}

// Dispatcher: 1 = Eje Clásico, 2 = Eje de Tónica
function negativeOf(keyId, rule) {
  if (rule === 2) return tonicNegativeOf(keyId);
  return classicNegativeOf(keyId);
}

// Aplica la reflexión negativa a toda la progresión CUSTOM con la regla dada.
// rule: 1 = Paralela, 2 = Collier.
// Si ya había una reflexión activa, primero restaura el original antes de
// aplicar la nueva regla (para evitar &quot;reflexionar una reflexión&quot;).
function applyNegativeToProgression(rule) {
  if (state.isNegativeActive) {
    // Ya hay una reflexión aplicada: restaurar antes de aplicar la nueva
    state.highlightOrder = state.negativeBackupOrder.slice();
    state.illuminatedKeys = new Set(state.negativeBackupIlluminated);
  }
  if (state.illuminatedKeys.size === 0) return;
  // Backup del estado actual (original) para poder restaurar
  state.negativeBackupOrder = state.highlightOrder.slice();
  state.negativeBackupIlluminated = new Set(state.illuminatedKeys);
  // Reflejar cada casilla del orden con la regla solicitada
  const newOrder = state.highlightOrder.map(k => negativeOf(k, rule));
  state.highlightOrder = newOrder;
  state.illuminatedKeys = new Set(newOrder);
  state.isNegativeActive = true;
  // NEG y NEG·1 son mutuamente excluyentes
  state.isNegativeSingleArmed = false;
  state.negativeSingleState = 0;
  state.negativeSingleFlipped = new Map();
}

// Restaura la progresión original tras desactivar NEG.
function restoreFromNegative() {
  if (state.negativeBackupOrder) {
    state.highlightOrder = state.negativeBackupOrder.slice();
    state.illuminatedKeys = new Set(state.negativeBackupIlluminated);
  }
  state.negativeBackupOrder = null;
  state.negativeBackupIlluminated = null;
  state.isNegativeActive = false;
}

// Refleja una sola casilla de la progresión por su equivalente negativo.
// Si la casilla ya fue reflejada antes, la devuelve a su estado original.
function flipSingleInProgression(keyId, rule) {
  // Buscar en qué posiciones del orden aparece el keyId tocado
  const indices = [];
  state.highlightOrder.forEach((k, i) => { if (k === keyId) indices.push(i); });
  if (indices.length === 0) return false;

  // ¿Es una casilla YA reflejada? Si sí, volverla al original.
  if (state.negativeSingleFlipped.has(keyId)) {
    const original = state.negativeSingleFlipped.get(keyId);
    for (const i of indices) state.highlightOrder[i] = original;
    state.negativeSingleFlipped.delete(keyId);
  } else {
    const negative = negativeOf(keyId, rule);
    for (const i of indices) state.highlightOrder[i] = negative;
    // Guardar para poder revertir: la key nueva → la key original
    state.negativeSingleFlipped.set(negative, keyId);
  }
  // Recalcular illuminatedKeys desde el orden
  state.illuminatedKeys = new Set(state.highlightOrder);
  return true;
}

// =====================================================
// ARMONÍA DIATÓNICA
// =====================================================
function generateHarmony(keyId) {
  state.harmonyList = [];
  const isMajor = keyId.startsWith('M-');
  const keyName = keyId.substring(2);
  let baseIndex = -1;
  for (let i = 0; i < musicalKeys.length; i++) {
    if ((isMajor &amp;&amp; musicalKeys[i].major === keyName) ||
        (!isMajor &amp;&amp; musicalKeys[i].minor === keyName)) {
      baseIndex = i; break;
    }
  }
  if (baseIndex === -1) return;
  const pattern = isMajor ? majorPattern : minorPattern;
  const isMajL  = isMajor ? majorIsMajor : minorIsMajor;
  const isDimL  = isMajor ? majorIsDimin : minorIsDimin;
  const syms    = isMajor ? majorSymbols : minorSymbols;
  for (let i = 0; i < pattern.length; i++) {
    const ti = (baseIndex + pattern[i]) % 12;
    const tk = musicalKeys[ti];
    const tIsMaj = isMajL[i];
    state.harmonyList.push({
      keyId: tIsMaj ? tk.majorId : tk.minorId,
      symbol: syms[i],
      isMajor: tIsMaj,
      isDiminished: isDimL[i],
    });
  }
}

// Helper técnico interno: convierte cualquier keyId a su tónica como mayor
// (Am → M-A, F♯m → M-F♯, etc.). Para mayores devuelve el mismo. Esto NO es un
// concepto musical &quot;paralela&quot;; es solo para que el código de cálculo del
// intercambio modal (escrito en términos de mayores) acepte cualquier tónica.
function keyIdToTonicMajor(keyId) {
  if (keyId.startsWith('M-')) return keyId;
  const minorName = keyId.substring(2);          // 'Am', 'F♯m', ...
  const rootName  = minorName.replace(/m$/, ''); // 'A',  'F♯',  ...
  for (const k of musicalKeys) {
    if (k.major === rootName) return k.majorId;
  }
  return null;
}

// Calcula los acordes del intercambio modal (sin el grado disminuido).
// Toma la tónica seleccionada (sea mayor o menor), aplica el modo elegido sobre
// esa misma tónica, y devuelve los 6 acordes diatónicos no-disminuidos.
function computeModalInterchangeKeys(keyId, modeIndex) {
  const tonicMajor = keyIdToTonicMajor(keyId);
  if (!tonicMajor) return new Set();
  const keyName = tonicMajor.substring(2);
  let baseIndex = -1;
  for (let i = 0; i < musicalKeys.length; i++) {
    if (musicalKeys[i].major === keyName) { baseIndex = i; break; }
  }
  if (baseIndex === -1) return new Set();
  const parentIndex = (baseIndex + modeParentOffsets[modeIndex]) % 12;
  const result = new Set();
  for (let i = 0; i < majorPattern.length; i++) {
    if (majorIsDimin[i]) continue;
    const ti = (parentIndex + majorPattern[i]) % 12;
    const tk = musicalKeys[ti];
    result.add(majorIsMajor[i] ? tk.majorId : tk.minorId);
  }
  return result;
}

// Acorde disminuido del intercambio modal.
function computeModalInterchangeDimKeys(keyId, modeIndex) {
  const tonicMajor = keyIdToTonicMajor(keyId);
  if (!tonicMajor) return new Set();
  const keyName = tonicMajor.substring(2);
  let baseIndex = -1;
  for (let i = 0; i < musicalKeys.length; i++) {
    if (musicalKeys[i].major === keyName) { baseIndex = i; break; }
  }
  if (baseIndex === -1) return new Set();
  const parentIndex = (baseIndex + modeParentOffsets[modeIndex]) % 12;
  const result = new Set();
  for (let i = 0; i < majorPattern.length; i++) {
    if (!majorIsDimin[i]) continue;
    const ti = (parentIndex + majorPattern[i]) % 12;
    const tk = musicalKeys[ti];
    result.add(majorIsMajor[i] ? tk.majorId : tk.minorId);
  }
  return result;
}

// Devuelve el keyId de la &quot;tónica del intercambio modal&quot;: la tónica de la escala
// mayor padre del modo aplicado. Ej: C + Eólico → Eb (porque C es el VI de Eb).
// Ej: Am + Frigio → F (porque A es el III de F = A frigio).
function computeModalTonicKeyId(keyId, modeIndex) {
  const tonicMajor = keyIdToTonicMajor(keyId);
  if (!tonicMajor) return null;
  const keyName = tonicMajor.substring(2);
  let baseIndex = -1;
  for (let i = 0; i < musicalKeys.length; i++) {
    if (musicalKeys[i].major === keyName) { baseIndex = i; break; }
  }
  if (baseIndex === -1) return null;
  const parentIndex = (baseIndex + modeParentOffsets[modeIndex]) % 12;
  return musicalKeys[parentIndex].majorId;
}

function recomputeMode() {
  if (state.activeModeIndex >= 0 &amp;&amp; state.selectedKeyId) {
    state.modeKeys      = computeModalInterchangeKeys(state.selectedKeyId, state.activeModeIndex);
    state.dimModeKeys   = computeModalInterchangeDimKeys(state.selectedKeyId, state.activeModeIndex);
    state.modeTonicKeyId = computeModalTonicKeyId(state.selectedKeyId, state.activeModeIndex);
  } else {
    state.modeKeys = new Set();
    state.dimModeKeys = new Set();
    state.modeTonicKeyId = null;
  }
}

function getKeyIndex(keyId) {
  const isMajor = keyId.startsWith('M-');
  const name = keyId.substring(2);
  for (let i = 0; i < musicalKeys.length; i++) {
    if ((isMajor &amp;&amp; musicalKeys[i].major === name) ||
        (!isMajor &amp;&amp; musicalKeys[i].minor === name)) return i;
  }
  return 0;
}

// Helper: rota un keyId 'M-X' o 'm-X' por N semitonos en el círculo cromático.
// +1 semitono = +7 pasos en el ciclo de quintas (mod 12). Conserva mayor/menor.
function transposeKeyId(keyId, semitones) {
  const isMajor = keyId.startsWith('M-');
  const idx = getKeyIndex(keyId);
  const newIdx = (((idx + semitones * 7) % 12) + 12) % 12;
  const k = musicalKeys[newIdx];
  return isMajor ? k.majorId : k.minorId;
}

function transposeKeySet(keySet, semitones) {
  const result = new Set();
  if (!keySet) return result;
  for (const keyId of keySet) result.add(transposeKeyId(keyId, semitones));
  return result;
}

function transposeProgressionAuxState(semitones) {
  if (state.negativeBackupOrder) {
    state.negativeBackupOrder = state.negativeBackupOrder.map(keyId => transposeKeyId(keyId, semitones));
  }
  if (state.negativeBackupIlluminated) {
    state.negativeBackupIlluminated = transposeKeySet(state.negativeBackupIlluminated, semitones);
  }
  if (state.negativeSingleFlipped.size > 0) {
    const transposedMap = new Map();
    for (const [flippedKeyId, originalKeyId] of state.negativeSingleFlipped.entries()) {
      transposedMap.set(
        transposeKeyId(flippedKeyId, semitones),
        transposeKeyId(originalKeyId, semitones)
      );
    }
    state.negativeSingleFlipped = transposedMap;
  }
}

// Convierte una tonalidad menor a su relativa mayor (para cálculos cromáticos).
// Am ↔ C, Em ↔ G, etc. (misma posición horaria en el círculo).
function toMajorEquivalent(keyId) {
  if (keyId.startsWith('M-')) return keyId;
  const idx = getKeyIndex(keyId);
  return musicalKeys[idx].majorId;
}

// Calcula la distancia cromática (en semitonos, 0..11) del ancla a la tónica
// actual. Trata mayores/menores relativos como equivalentes (Am ≡ C, Dm ≡ F).
// Siempre devuelve un valor en 0..+11 (semitonos arriba en sentido cromático).
function chromaticDistance(fromKeyId, toKeyId) {
  const fromIdx = getKeyIndex(toMajorEquivalent(fromKeyId));
  const toIdx   = getKeyIndex(toMajorEquivalent(toKeyId));
  const fromChroma = (fromIdx * 7) % 12;
  const toChroma   = (toIdx   * 7) % 12;
  return ((toChroma - fromChroma) % 12 + 12) % 12;
}

// Recalcula state.transposeValue como la distancia cromática del ancla a la tónica.
function refreshTransposeValue() {
  if (state.anchorKeyId &amp;&amp; state.selectedKeyId) {
    state.transposeValue = chromaticDistance(state.anchorKeyId, state.selectedKeyId);
  } else {
    state.transposeValue = 0;
  }
}

// Restaura la tonalidad al ancla guardada (acción del display de transport).
function resetToAnchor() {
  if (!state.anchorKeyId) return;
  state.selectedKeyId = state.anchorKeyId;
  generateHarmony(state.selectedKeyId);
  recomputeMode();
  if (state.anchorIlluminated) {
    state.illuminatedKeys = new Set(state.anchorIlluminated);
  }
  if (state.anchorHighlightOrder) {
    state.highlightOrder = state.anchorHighlightOrder.slice();
  }
  state.transposeValue = 0;
}

function transposeStep(step) {
  let didSomething = false;

  // 1. Si hay shape CUSTOM iluminado, transponerlo.
  if (state.illuminatedKeys.size > 0) {
    state.illuminatedKeys = transposeKeySet(state.illuminatedKeys, step);
    state.highlightOrder = state.highlightOrder.map(k => transposeKeyId(k, step));
    transposeProgressionAuxState(step);
    didSomething = true;
  }

  // 2. Si hay tonalidad seleccionada, transponerla (su armonía se regenera).
  if (state.selectedKeyId) {
    state.selectedKeyId = transposeKeyId(state.selectedKeyId, step);
    generateHarmony(state.selectedKeyId);
    recomputeMode();
    didSomething = true;
  }

  // 3. Recalcular el contador desde el ancla
  if (didSomething) {
    refreshTransposeValue();
  }
}

// =====================================================
// DIBUJADO DEL CÍRCULO (SVG)
// =====================================================
const VB = 560;            // viewBox
const CX = VB / 2;
const CY = VB / 2;
const BASE_R = VB / 2.1;   // ~266
const MAJOR_R = BASE_R * 0.62;     // outer ring inner edge -> ajustado
const MINOR_R_OUTER = BASE_R * 0.62;
const MINOR_R_INNER = BASE_R * (90/140) * 0.62 * (90/140) ; // placeholder
// Recalculamos según proporciones del painter original (140 base):
// majorRadiusAbs = baseRadius
// minorRadiusAbs = baseRadius * 90/140
// centerRadiusAbs = baseRadius * 40/140
// Aumentamos CIRCLE_BASE para que el círculo quede cerca del borde interior
// de los botones irregulares (que están a ~ R_MAJOR + ~10px de gap).
const CIRCLE_BASE = VB * 0.41; // radio del círculo musical (antes 0.34)
const R_MAJOR  = CIRCLE_BASE;
const R_MINOR  = CIRCLE_BASE * (90/140);
const R_CENTER = CIRCLE_BASE * (40/140);

function polar(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
}

// Crea un path SVG para un anillo segmentado (sector entre 2 radios y 2 ángulos)
function ringSegmentPath(cx, cy, rInner, rOuter, startDeg, endDeg) {
  const [x1, y1] = polar(cx, cy, rOuter, startDeg);
  const [x2, y2] = polar(cx, cy, rOuter, endDeg);
  const [x3, y3] = polar(cx, cy, rInner, endDeg);
  const [x4, y4] = polar(cx, cy, rInner, startDeg);
  const largeArc = (endDeg - startDeg) > 180 ? 1 : 0;
  return [
    'M', x1, y1,
    'A', rOuter, rOuter, 0, largeArc, 1, x2, y2,
    'L', x3, y3,
    'A', rInner, rInner, 0, largeArc, 0, x4, y4,
    'Z'
  ].join(' ');
}

function getSegmentColor(keyId) {
  if (state.illuminatedKeys.has(keyId)) {
    // Si la casilla iluminada en CUSTOM es además la tonalidad seleccionada,
    // se pinta de rojo pálido para distinguirla del resto de la ruta.
    if (keyId === state.selectedKeyId) return '#ff8a9c';
    return '#ff0033';
  }
  if (state.dimModeKeys.has(keyId)) return 'rgba(120,144,156,0.6)';
  if (state.modeKeys.has(keyId)) {
    // Tónica del modo paralelo: azul claro distintivo.
    // Resto del modo: mismo gris-azul que las casillas dim para que el modo
    // se vea como un único conjunto de dos tonos (tónica + resto).
    if (keyId === state.modeTonicKeyId) {
      return 'rgba(79,195,247,0.55)';
    }
    return 'rgba(120,144,156,0.6)';
  }
  const isSelected = keyId === state.selectedKeyId;
  const isRelated = state.harmonyList.some(h => h.keyId === keyId);
  const css = getComputedStyle(document.body);
  if (isSelected) return css.getPropertyValue('--segSelected').trim();
  if (isRelated)  return css.getPropertyValue('--segRelated').trim();
  return css.getPropertyValue('--segNormal').trim();
}

function degreeToArabic(roman) {
  const r = roman.replace('°','').toLowerCase();
  const map = {i:'1', ii:'2', iii:'3', iv:'4', v:'5', vi:'6', vii:'7'};
  return map[r] || roman;
}

function formatNote(text) {
  if (state.useLatinNotation) return toLatin(text);
  return text;
}

// Dibuja el contorno exterior del conjunto armónico (perímetro global, no por casilla).
// Para cada celda en la armonía, dibuja solo los lados que NO son compartidos con
// otra celda también en la armonía.
function drawHarmonyOutline(layer, color) {
  if (state.harmonyList.length === 0) return;

  // Mapa: para cada posición horaria 0..11, si tiene mayor/menor en el conjunto.
  const inSet = []; // [{major: bool, minor: bool}, ...]
  for (let i = 0; i < 12; i++) inSet.push({ major: false, minor: false });

  for (const h of state.harmonyList) {
    const idx = getKeyIndex(h.keyId);
    if (h.keyId.startsWith('M-')) inSet[idx].major = true;
    else                          inSet[idx].minor = true;
  }

  // Helper: ¿el vecino en posición (i+offset)%12 también está en el conjunto?
  const has = (i, ring) => inSet[((i % 12) + 12) % 12][ring];

  // Construimos los segmentos de borde a dibujar como paths individuales.
  // Cada celda tiene 4 lados: outer (arc), inner (arc), left (radial), right (radial).
  // Para mayor: outer = R_MAJOR, inner = R_MINOR.
  // Para menor: outer = R_MINOR, inner = R_CENTER.
  // Compartidos:
  //  - outer del mayor: nunca compartido (es el borde exterior del círculo)
  //  - inner del mayor = outer del menor (compartido si misma posición tiene menor también)
  //  - inner del menor: nunca compartido (borde interior del círculo)
  //  - left/right del mayor: compartido con vecino mayor
  //  - left/right del menor: compartido con vecino menor

  const segments = [];

  for (let i = 0; i < 12; i++) {
    const angle = musicalKeys[i].angle;
    const startDeg = angle - SEGMENT_ANGLE/2;
    const endDeg   = angle + SEGMENT_ANGLE/2 - 0.5;

    // ----- CELDA MAYOR -----
    if (inSet[i].major) {
      // Outer arc (siempre exterior al conjunto)
      segments.push({ type: 'arc', r: R_MAJOR, a1: startDeg, a2: endDeg, sweep: 1 });
      // Inner arc del mayor: solo si la celda menor NO está en el conjunto
      if (!inSet[i].minor) {
        segments.push({ type: 'arc', r: R_MINOR, a1: startDeg, a2: endDeg, sweep: 1 });
      }
      // Lado izquierdo (start) del mayor: solo si vecino izquierdo mayor NO está
      if (!has(i - 1, 'major')) {
        segments.push({ type: 'radial', r1: R_MINOR, r2: R_MAJOR, a: startDeg });
      }
      // Lado derecho (end) del mayor
      if (!has(i + 1, 'major')) {
        segments.push({ type: 'radial', r1: R_MINOR, r2: R_MAJOR, a: endDeg });
      }
    }

    // ----- CELDA MENOR -----
    if (inSet[i].minor) {
      // Outer arc del menor: solo si la celda mayor NO está en el conjunto
      if (!inSet[i].major) {
        segments.push({ type: 'arc', r: R_MINOR, a1: startDeg, a2: endDeg, sweep: 1 });
      }
      // Inner arc del menor (siempre interior al conjunto)
      segments.push({ type: 'arc', r: R_CENTER, a1: startDeg, a2: endDeg, sweep: 1 });
      // Lado izquierdo del menor
      if (!has(i - 1, 'minor')) {
        segments.push({ type: 'radial', r1: R_CENTER, r2: R_MINOR, a: startDeg });
      }
      // Lado derecho del menor
      if (!has(i + 1, 'minor')) {
        segments.push({ type: 'radial', r1: R_CENTER, r2: R_MINOR, a: endDeg });
      }
    }
  }

  // Construimos un único path con todos los segmentos
  let d = '';
  for (const s of segments) {
    if (s.type === 'arc') {
      const [x1, y1] = polar(CX, CY, s.r, s.a1);
      const [x2, y2] = polar(CX, CY, s.r, s.a2);
      const largeArc = (s.a2 - s.a1) > 180 ? 1 : 0;
      d += `M ${x1} ${y1} A ${s.r} ${s.r} 0 ${largeArc} ${s.sweep} ${x2} ${y2} `;
    } else { // radial
      const [x1, y1] = polar(CX, CY, s.r1, s.a);
      const [x2, y2] = polar(CX, CY, s.r2, s.a);
      d += `M ${x1} ${y1} L ${x2} ${y2} `;
    }
  }

  if (d) {
    const outline = document.createElementNS('http://www.w3.org/2000/svg','path');
    outline.setAttribute('d', d);
    outline.setAttribute('fill', 'none');
    outline.setAttribute('stroke', color);
    outline.setAttribute('stroke-width', '2.2');
    outline.setAttribute('stroke-linecap', 'round');
    outline.setAttribute('stroke-linejoin', 'round');
    outline.style.pointerEvents = 'none';
    layer.appendChild(outline);
  }
}

function renderCircle() {
  const circleLayer = document.getElementById('circle-layer');
  const textLayer   = document.getElementById('text-layer');
  const centerLayer = document.getElementById('center-layer');
  circleLayer.innerHTML = '';
  textLayer.innerHTML   = '';
  centerLayer.innerHTML = '';

  const css = getComputedStyle(document.body);
  const ringColor   = css.getPropertyValue('--ring').trim();
  const borderColor = css.getPropertyValue('--segBorder').trim();
  const textMajor   = css.getPropertyValue('--textMajor').trim();
  const textMinor   = css.getPropertyValue('--textMinor').trim();

  // Anillo de fondo (entre R_MAJOR y R_CENTER, con evenodd)
  const bgRing = document.createElementNS('http://www.w3.org/2000/svg','path');
  bgRing.setAttribute('d',
    `M ${CX - R_MAJOR} ${CY} a ${R_MAJOR} ${R_MAJOR} 0 1 0 ${R_MAJOR*2} 0 a ${R_MAJOR} ${R_MAJOR} 0 1 0 ${-R_MAJOR*2} 0 Z ` +
    `M ${CX - R_CENTER} ${CY} a ${R_CENTER} ${R_CENTER} 0 1 1 ${R_CENTER*2} 0 a ${R_CENTER} ${R_CENTER} 0 1 1 ${-R_CENTER*2} 0 Z`
  );
  bgRing.setAttribute('fill', ringColor);
  bgRing.setAttribute('fill-rule', 'evenodd');
  circleLayer.appendChild(bgRing);

  // 12 segmentos (mayor afuera, menor adentro)
  for (const key of musicalKeys) {
    const startDeg = key.angle - SEGMENT_ANGLE/2;
    const endDeg   = key.angle + SEGMENT_ANGLE/2 - 0.5;

    // -- segmento mayor
    const majorPath = document.createElementNS('http://www.w3.org/2000/svg','path');
    majorPath.setAttribute('d', ringSegmentPath(CX, CY, R_MINOR, R_MAJOR, startDeg, endDeg));
    majorPath.setAttribute('fill', getSegmentColor(key.majorId));
    majorPath.setAttribute('stroke', borderColor);
    majorPath.setAttribute('stroke-width', '0.8');
    majorPath.classList.add('seg');
    majorPath.dataset.keyid = key.majorId;
    circleLayer.appendChild(majorPath);

    // -- segmento menor
    const minorPath = document.createElementNS('http://www.w3.org/2000/svg','path');
    minorPath.setAttribute('d', ringSegmentPath(CX, CY, R_CENTER, R_MINOR, startDeg, endDeg));
    minorPath.setAttribute('fill', getSegmentColor(key.minorId));
    minorPath.setAttribute('stroke', borderColor);
    minorPath.setAttribute('stroke-width', '0.8');
    minorPath.classList.add('seg');
    minorPath.dataset.keyid = key.minorId;
    circleLayer.appendChild(minorPath);

    // -- texto mayor
    const fsMajor = R_MAJOR * (25/140);
    const fsMinor = R_MAJOR * (14/140);
    const fsSym   = R_MAJOR * (12/140);

    const [mx, my] = polar(CX, CY, (R_MAJOR + R_MINOR)/2, key.angle);
    const majorH = state.harmonyList.find(h => h.keyId === key.majorId);
    const majorDisplay = (majorH &amp;&amp; majorH.isDiminished) ? key.major + '°' : key.major;
    const isMajSel = (key.majorId === state.selectedKeyId);
    // En flat: solo la tónica seleccionada lleva texto negro; el resto siempre blanco
    const majorInHarmony = !!majorH;
    const majorColor = (state.theme === 'flat' &amp;&amp; isMajSel) ? '#000' : textMajor;
    const tMaj = document.createElementNS('http://www.w3.org/2000/svg','text');
    tMaj.setAttribute('x', mx);
    tMaj.setAttribute('y', my);
    tMaj.setAttribute('font-size', fsMajor);
    tMaj.setAttribute('font-weight', '900');
    tMaj.style.fill = majorColor;
    tMaj.classList.add('seg-text');
    tMaj.textContent = formatNote(majorDisplay);
    textLayer.appendChild(tMaj);

    // -- texto menor
    const [nx, ny] = polar(CX, CY, (R_MINOR + R_CENTER)/2, key.angle);
    const minorH = state.harmonyList.find(h => h.keyId === key.minorId);
    let minorDisplay = key.minor;
    if (minorH &amp;&amp; minorH.isDiminished) {
      minorDisplay = key.minor.replace('m','') + '°';
    }
    const isMinSel = (key.minorId === state.selectedKeyId);
    const minorInHarmony = !!minorH;
    const minorColor = (state.theme === 'flat' &amp;&amp; isMinSel) ? '#000' : textMinor;
    const tMin = document.createElementNS('http://www.w3.org/2000/svg','text');
    tMin.setAttribute('x', nx);
    tMin.setAttribute('y', ny);
    tMin.setAttribute('font-size', fsMinor);
    tMin.setAttribute('font-weight', '700');
    tMin.style.fill = minorColor;
    tMin.classList.add('seg-text');
    tMin.textContent = formatNote(minorDisplay);
    textLayer.appendChild(tMin);

    // -- símbolos romanos / arábigos (esquina superior-derecha de cada casilla)
    if (state.harmonyList.length > 0) {
      // Ángulo hacia la esquina izquierda (CCW) del segmento
      const symbolAngle = key.angle - 12;
      const fsSymCorner  = R_MAJOR * (8/140); // más pequeño que antes
      // Mayor: esquina exterior del anillo mayor
      if (majorH) {
        let sym = state.useRomanNumerals ? majorH.symbol.toUpperCase() : degreeToArabic(majorH.symbol);
        const symR = R_MAJOR - 5 * (R_MAJOR/140);
        const [sx, sy] = polar(CX, CY, symR, symbolAngle);
        const tSym = document.createElementNS('http://www.w3.org/2000/svg','text');
        tSym.setAttribute('x', sx);
        tSym.setAttribute('y', sy);
        tSym.setAttribute('font-size', fsSymCorner);
        tSym.classList.add('symbol-text');
        tSym.textContent = sym;
        textLayer.appendChild(tSym);
      }
      // Menor: esquina exterior del anillo menor
      if (minorH) {
        let sym = state.useRomanNumerals ? minorH.symbol : degreeToArabic(minorH.symbol);
        const symR = R_MINOR - 5 * (R_MAJOR/140);
        const [sx, sy] = polar(CX, CY, symR, symbolAngle);
        const tSym = document.createElementNS('http://www.w3.org/2000/svg','text');
        tSym.setAttribute('x', sx);
        tSym.setAttribute('y', sy);
        tSym.setAttribute('font-size', fsSymCorner);
        tSym.classList.add('symbol-text');
        tSym.textContent = sym;
        textLayer.appendChild(tSym);
      }
    }

    // -- marcador de disminuido del modo paralelo (círculo °)
    const hasMajDim = state.dimModeKeys.has(key.majorId);
    const hasMinDim = state.dimModeKeys.has(key.minorId);
    if (hasMajDim || hasMinDim) {
      const r = hasMajDim ? (R_MAJOR - 5) : (R_MINOR - 5);
      const [dx, dy] = polar(CX, CY, r, key.angle);
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx', dx);
      c.setAttribute('cy', dy);
      c.setAttribute('r', 3.5);
      c.classList.add('dim-marker');
      textLayer.appendChild(c);
    }
  }

  // -- centro: alteraciones de la tonalidad seleccionada
  if (state.selectedKeyId) {
    const cleanKey = state.selectedKeyId.substring(2);
    const alts = keySignatures[cleanKey] || [];
    const fs = R_CENTER * 0.32;
    const lh = fs * 1.4;
    if (alts.length === 0) {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', CX);
      t.setAttribute('y', CY);
      t.setAttribute('font-size', fs * 0.8);
      t.classList.add('center-text');
      t.textContent = 'NATURAL';
      centerLayer.appendChild(t);
    } else {
      const perLine = 3;
      const totalLines = Math.ceil(alts.length / perLine);
      const totalH = (totalLines - 1) * lh;
      const startY = CY - totalH / 2;
      for (let i = 0; i < totalLines; i++) {
        const subset = alts.slice(i*perLine, i*perLine + perLine);
        const t = document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x', CX);
        t.setAttribute('y', startY + i * lh);
        t.setAttribute('font-size', fs);
        t.classList.add('center-text');
        t.textContent = subset.join(' ');
        centerLayer.appendChild(t);
      }
    }
  }

  // -- borde global del conjunto armónico (solo tema flat)
  if (state.theme === 'flat' &amp;&amp; state.harmonyList.length > 0) {
    drawHarmonyOutline(textLayer, '#ffffff');
  }

  // -- flechas en CUSTOM mode
  renderArrows();
}

function renderArrows() {
  const layer = document.getElementById('arrows-layer');
  layer.innerHTML = '';
  if (!state.isCustomMode || state.highlightOrder.length < 2) return;

  for (let i = 0; i < state.highlightOrder.length - 1; i++) {
    const from = getKeyPosition(state.highlightOrder[i]);
    const to   = getKeyPosition(state.highlightOrder[i+1]);
    if (!from || !to) continue;

    // Acortar la línea para no atravesar las casillas
    const dx = to[0] - from[0], dy = to[1] - from[1];
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 1) continue;
    const ux = dx/len, uy = dy/len;
    const box = 18;
    const fx = from[0] + ux*box, fy = from[1] + uy*box;
    const tx = to[0] - ux*box,   ty = to[1] - uy*box;

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', fx); line.setAttribute('y1', fy);
    line.setAttribute('x2', tx); line.setAttribute('y2', ty);
    line.setAttribute('stroke', '#ffeb3b');
    line.setAttribute('stroke-width', 3);
    line.setAttribute('opacity', 0.9);
    layer.appendChild(line);

    // Cabeza de flecha
    const headSize = 8;
    const px = -uy, py = ux;
    const tipX = tx, tipY = ty;
    const baseX = tx - ux*headSize, baseY = ty - uy*headSize;
    const lx = baseX + px*headSize*0.6, ly = baseY + py*headSize*0.6;
    const rx = baseX - px*headSize*0.6, ry = baseY - py*headSize*0.6;
    const head = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    head.setAttribute('points', `${tipX},${tipY} ${lx},${ly} ${rx},${ry}`);
    head.setAttribute('fill', '#ffeb3b');
    layer.appendChild(head);
  }
}

function getKeyPosition(keyId) {
  const isMajor = keyId.startsWith('M-');
  const name = keyId.substring(2);
  for (const k of musicalKeys) {
    if ((isMajor &amp;&amp; k.major === name) || (!isMajor &amp;&amp; k.minor === name)) {
      const r = isMajor ? (R_MAJOR + R_MINOR)/2 : (R_MINOR + R_CENTER)/2;
      return polar(CX, CY, r, k.angle);
    }
  }
  return null;
}

// =====================================================
// INTERACCIÓN CON SEGMENTOS
// =====================================================
function onSegmentTap(keyId, evt) {
  // NEG·1 armado: si la casilla pertenece a la progresión, reflejarla.
  // No se permite añadir/quitar casillas mientras NEG·1 está armado.
  if (state.isNegativeSingleArmed &amp;&amp; state.isCustomMode) {
    if (state.illuminatedKeys.has(keyId)) {
      flipSingleInProgression(keyId, state.negativeSingleState);
    }
    return;
  }
  if (state.isCustomMode) {
    // Modo CUSTOM:
    //  - Si la casilla tocada es la ÚLTIMA del orden → la borramos
    //    (corregir error: el usuario se arrepintió de la última selección).
    //  - Si NO es la última → la añadimos otra vez como nueva pasada
    //    (el usuario está volviendo a pasar por una casilla anterior).
    const last = state.highlightOrder[state.highlightOrder.length - 1];
    if (last === keyId) {
      state.highlightOrder.pop();
      // Solo apagamos la iluminación si esa casilla ya no aparece en ningún
      // otro lugar del orden (puede haber pasadas anteriores por la misma).
      if (!state.highlightOrder.includes(keyId)) {
        state.illuminatedKeys.delete(keyId);
      }
    } else {
      state.highlightOrder.push(keyId);
      state.illuminatedKeys.add(keyId); // por si no estaba aún
    }
  } else {
    // Toggle: si ya está seleccionada, deseleccionar (apagar el círculo)
    if (state.selectedKeyId === keyId) {
      state.selectedKeyId = null;
      state.harmonyList = [];
      state.modeKeys = new Set();
      state.dimModeKeys = new Set();
      state.anchorKeyId = null;
      state.anchorIlluminated = null;
      state.anchorHighlightOrder = null;
    } else {
      state.selectedKeyId = keyId;
      generateHarmony(keyId);
      recomputeMode();
      // Fijar nuevo ancla en esta tonalidad
      state.anchorKeyId = keyId;
      state.anchorIlluminated = new Set(state.illuminatedKeys);
      state.anchorHighlightOrder = state.highlightOrder.slice();
    }
    state.transposeValue = 0;
  }
  // No renderizamos aquí — endDrag lo hace.
}

// =====================================================
// BOTONES IRREGULARES (paths del SVG original)
// =====================================================
// Las constantes del SVG original
const SVG_CX = 235.51;
const SVG_CY = 227.41;
const SVG_RADIUS = 210.53;

// Construimos los paths igual que en circle_irregular_controls.dart
// pero los escalamos al viewBox de 560
function buildIrregularPaths() {
  const visualDesignSize = 320;
  const targetRadius = visualDesignSize / 2.1;
  const gap = 15;
  const scale = (targetRadius + gap) / SVG_RADIUS;

  // En el original Flutter había 2 transformaciones:
  //  matrixBase: translate(appCx, appCy) -> scale -> translate(-svgCx, -svgCy)
  //  matrixGroup = matrixBase * translate(-52.46, -308.9)
  // Vamos a generar un transform que aplique todo a un viewBox de 560.
  // Como el &quot;appSize&quot; original era 320, escalamos otra vez 560/320.
  const appScale = VB / visualDesignSize;
  const finalScale = scale * appScale;
  const cx = VB / 2;
  const cy = VB / 2;

  // matrixBase aplicado a un punto (px, py) en coordenadas SVG-original:
  //   x = cx + finalScale * (px - svgCx)
  //   y = cy + finalScale * (py - svgCy)
  // matrixGroup aplica antes (px - 52.46, py - 308.9), luego matrixBase
  function tBase(px, py) {
    return [cx + finalScale * (px - SVG_CX),
            cy + finalScale * (py - SVG_CY)];
  }
  function tGroup(px, py) {
    return tBase(px - 52.46, py - 308.9);
  }
  // Para arcos hay que escalar también el radio
  const groupScale = finalScale;

  // Helper para construir paths con M, l (lineTo relativo), arcTo, etc.
  // En lugar de re-implementar relativeLineTo, transformamos los puntos
  // calculados manualmente y construimos el d con líneas absolutas + arcos.

  // 1a. topRightUpper
  // M(511.84,309.4) l(-72.69,72.68) arc(-142.87,-61.72,r=215.16,sweep=0) l(0,-11) Z
  function pathTopRightUpper() {
    const [x0,y0] = tGroup(511.84, 309.4);
    const [x1,y1] = tGroup(511.84 - 72.69, 309.4 + 72.68);
    const [x2,y2] = tGroup(511.84 - 72.69 - 142.87, 309.4 + 72.68 - 61.72);
    const [x3,y3] = tGroup(511.84 - 72.69 - 142.87, 309.4 + 72.68 - 61.72 - 11);
    const r = 215.16 * groupScale;
    return `M ${x0} ${y0} L ${x1} ${y1} A ${r} ${r} 0 0 0 ${x2} ${y2} L ${x3} ${y3} Z`;
  }

  // 1b. rightSide
  // M(522.63,319) l(0,210) L(503.64,529) arc(-54.58,-136.42,r=215.11,sweep=0) Z
  function pathRightSide() {
    const [x0,y0] = tGroup(522.63, 319);
    const [x1,y1] = tGroup(522.63, 319 + 210);
    const [x2,y2] = tGroup(503.64, 529);
    const [x3,y3] = tGroup(503.64 - 54.58, 529 - 136.42);
    const r = 215.11 * groupScale;
    return `M ${x0} ${y0} L ${x1} ${y1} L ${x2} ${y2} A ${r} ${r} 0 0 0 ${x3} ${y3} Z`;
  }

  // 2. topLeft
  function pathTopLeft() {
    const [x0,y0] = tGroup(63.8, 309.4);
    const [x1,y1] = tGroup(63.8 + 72.69, 309.4 + 72.68);
    const [x2,y2] = tGroup(63.8 + 72.69 + 142.87, 309.4 + 72.68 - 61.72);
    const [x3,y3] = tGroup(63.8 + 72.69 + 142.87, 309.4 + 72.68 - 61.72 - 11);
    const r = 215.16 * groupScale;
    return `M ${x0} ${y0} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} L ${x3} ${y3} Z`;
  }

  // 3. leftSide
  function pathLeftSide() {
    const [x0,y0] = tGroup(53, 319);
    const [x1,y1] = tGroup(53, 319 + 210);
    const [x2,y2] = tGroup(72, 529);
    const [x3,y3] = tGroup(72 + 54.58, 529 - 136.42);
    const r = 215.11 * groupScale;
    return `M ${x0} ${y0} L ${x1} ${y1} L ${x2} ${y2} A ${r} ${r} 0 0 1 ${x3} ${y3} Z`;
  }

  // 4. bottomLeft
  // M(72,543.36) L(53,543.36) l(0,148) l(63.3,0) l(10.87,-10.87) arcTo(72,543.36,r=215.11,sweep=1)
  function pathBottomLeft() {
    const [x0,y0] = tGroup(72, 543.36);
    const [x1,y1] = tGroup(53, 543.36);
    const [x2,y2] = tGroup(53, 543.36 + 148);
    const [x3,y3] = tGroup(53 + 63.3, 543.36 + 148);
    const [x4,y4] = tGroup(53 + 63.3 + 10.87, 543.36 + 148 - 10.87);
    const r = 215.11 * groupScale;
    return `M ${x0} ${y0} L ${x1} ${y1} L ${x2} ${y2} L ${x3} ${y3} L ${x4} ${y4} A ${r} ${r} 0 0 1 ${x0} ${y0} Z`;
  }

  // 5. bottomCenterLeft
  // M(124.54,699.6) l(0,63.3) L(279.36,699.6+63.3) l(0,-11) arc(-144.17,-63,r=215.26,sweep=1)
  function pathBottomCenterLeft() {
    const [x0,y0] = tGroup(124.54, 699.6);
    const [x1,y1] = tGroup(124.54, 699.6 + 63.3);
    const [x2,y2] = tGroup(279.36, 699.6 + 63.3);
    const [x3,y3] = tGroup(279.36, 699.6 + 63.3 - 11);
    const [x4,y4] = tGroup(279.36 - 144.17, 699.6 + 63.3 - 11 - 63);
    const r = 215.26 * groupScale;
    return `M ${x0} ${y0} L ${x1} ${y1} L ${x2} ${y2} L ${x3} ${y3} A ${r} ${r} 0 0 1 ${x4} ${y4} Z`;
  }

  // 6. bottomRight
  function pathBottomRight() {
    const [x0,y0] = tGroup(503.42, 543.64);
    const [x1,y1] = tGroup(503.42 + 19, 543.64);
    const [x2,y2] = tGroup(503.42 + 19, 543.64 + 148);
    const [x3,y3] = tGroup(503.42 + 19 - 63.3, 543.64 + 148);
    const [x4,y4] = tGroup(503.42 + 19 - 63.3 - 10.88, 543.64 + 148 - 10.87);
    const r = 215.12 * groupScale;
    return `M ${x0} ${y0} L ${x1} ${y1} L ${x2} ${y2} L ${x3} ${y3} L ${x4} ${y4} A ${r} ${r} 0 0 0 ${x0} ${y0} Z`;
  }

  // 7. bottomCenterRight
  function pathBottomCenterRight() {
    const [x0,y0] = tGroup(450.83, 699.88);
    const [x1,y1] = tGroup(450.83, 699.88 + 63.3);
    const [x2,y2] = tGroup(296, 699.88 + 63.3);
    const [x3,y3] = tGroup(296, 699.88 + 63.3 - 11);
    const [x4,y4] = tGroup(296 + 144.18, 699.88 + 63.3 - 11 - 63);
    const r = 215.29 * groupScale;
    return `M ${x0} ${y0} L ${x1} ${y1} L ${x2} ${y2} L ${x3} ${y3} A ${r} ${r} 0 0 0 ${x4} ${y4} Z`;
  }

  // 8. rectLeft (zoom-out / antiguo fullscreen)  -> ahora será NOTACIÓN
  function pathRectLeft() {
    const [x0,y0] = tBase(0.5, 396.93);
    const [x1,y1] = tBase(0.5 + 56, 396.93 + 57.07);
    return `M ${x0} ${y0} L ${x1} ${y0} L ${x1} ${y1} L ${x0} ${y1} Z`;
  }
  function rectLeftCenter() {
    const [x0,y0] = tBase(0.5, 396.93);
    const [x1,y1] = tBase(0.5 + 56, 396.93 + 57.07);
    return [(x0+x1)/2, (y0+y1)/2];
  }

  // 9. rectRight (transpose value display)
  function pathRectRight() {
    const [x0,y0] = tBase(413.64, 396.93);
    const [x1,y1] = tBase(413.64 + 56, 396.93 + 57.07);
    return `M ${x0} ${y0} L ${x1} ${y0} L ${x1} ${y1} L ${x0} ${y1} Z`;
  }
  function rectRightCenter() {
    const [x0,y0] = tBase(413.64, 396.93);
    const [x1,y1] = tBase(413.64 + 56, 396.93 + 57.07);
    return [(x0+x1)/2, (y0+y1)/2];
  }

  function bottomCenterLeftCenter() {
    const [x0, y0] = tGroup(124.54, 699.6);
    const [x1, y1] = tGroup(279.36, 699.6 + 63.3);
    return [(x0 + x1) / 2, (y0 + y1) / 2];
  }

  return {
    topRightUpper: pathTopRightUpper(),
    rightSide:     pathRightSide(),
    topLeft:       pathTopLeft(),
    leftSide:      pathLeftSide(),
    bottomLeft:    pathBottomLeft(),
    bottomCenterLeft:  pathBottomCenterLeft(),
    bottomRight:   pathBottomRight(),
    bottomCenterRight: pathBottomCenterRight(),
    rectLeft:      pathRectLeft(),
    rectRight:     pathRectRight(),
    rectLeftCenter:  rectLeftCenter(),
    rectRightCenter: rectRightCenter(),
    bottomCenterLeftCenter: bottomCenterLeftCenter(),
  };
}

    { id: 'bottomCenterRight', label: getCircleButtonLabel('transposeDown'),  action: 'transposeDown',  curveAngle: 60,  flip: true },

  for (const cfg of buttonsConfig) {

    path.setAttribute('d', irregularPaths[cfg.id]);
    path.classList.add('ibtn');
    if (cfg.id === 'rectLeft' || cfg.id === 'rectRight') path.classList.add('ibtn-rect');
    path.dataset.btnid = cfg.id;
    path.dataset.action = cfg.action;

    // Estado activo
    if (cfg.id === 'topRightUpper' &amp;&amp; state.isCustomMode) path.classList.add('active-red');
    if (cfg.id === 'rightSide' &amp;&amp; state.activeModeIndex >= 0) path.classList.add('active-blue');
    // CLÁSICO (NEG): rojo cuando activo (estado 1 único)
    if (cfg.id === 'bottomLeft') {
      if (state.negativeState === 1) path.classList.add('active-red');
    }
    // NEG 1 (TÓNICA): parpadeo cuando armado (la animación comienza en rojo)
    if (cfg.id === 'bottomCenterLeft') {
      if (state.negativeSingleState === 1) {
        path.classList.add('neg1-armed');
      }
    }

    // Eventos
    path.addEventListener('click', e => onIrregularTap(cfg));
    path.addEventListener('pointerdown', e => path.classList.add('pressed'));
    path.addEventListener('pointerup',   e => path.classList.remove('pressed'));
    path.addEventListener('pointerleave',e => path.classList.remove('pressed'));
    path.addEventListener('pointercancel',e=> path.classList.remove('pressed'));

    layer.appendChild(path);
  }

  // Agregamos las etiquetas DESPUÉS de los paths
  for (const cfg of buttonsConfig) {
    if (cfg.id === 'rectLeft') {
      const [cxR, cyR] = irregularPaths.rectLeftCenter;
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', cxR);
      t.setAttribute('y', cyR);
      t.classList.add('notation-icon');
      t.textContent = state.useLatinNotation ? 'Do' : 'C';
      layer.appendChild(t);
      continue;
    }
    if (cfg.id === 'rectRight') {
      const [cxR, cyR] = irregularPaths.rectRightCenter;
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', cxR);
      t.setAttribute('y', cyR);
      t.classList.add('transpose-value');
      t.textContent = (state.transposeValue > 0 ? '+' : '') + state.transposeValue;
      layer.appendChild(t);
      continue;
    }

    // Texto curvo en el botón. Usamos un radio fijo (~ similar al original 182)
    // pero escalado al viewBox.
    const radius = 182 * (VB / 320);

    // Determinar color del texto según estado del botón
    let textColor = '#FFD54F'; // default amarillo
    let overrideText = null;

    if (cfg.id === 'rightSide' &amp;&amp; state.activeModeIndex >= 0) {
      textColor = '#4FC3F7';
      overrideText = getModeNames()[state.activeModeIndex].toUpperCase();
    } else if (cfg.id === 'bottomLeft' || cfg.id === 'bottomCenterLeft') {
      // NEG y NEG·1: apagados si no hay progresión
      const hasProgression = state.illuminatedKeys.size > 0 || state.isNegativeActive;
      if (!hasProgression) {
        textColor = 'rgba(255,213,79,0.25)'; // apagado/tenue
      } else if (cfg.id === 'bottomLeft' &amp;&amp; state.isNegativeActive) {
        textColor = '#ffffff'; // activo
      } else if (cfg.id === 'bottomCenterLeft' &amp;&amp; state.isNegativeSingleArmed) {
        textColor = '#ffffff'; // activo armado
        overrideText = 'NEG 1 ☝';
      }
    }

    drawCurvedText(layer, cfg.label, cfg.curveAngle, radius, !!cfg.flip,
      textColor, overrideText);
  }
}

// Dibuja texto curvo siguiendo un círculo (centrado en CX, CY)
// Replica la lógica de _drawCurvedText del archivo Dart
function drawCurvedText(parent, text, angleDeg, radius, isFlipped, color, overrideText) {
  const finalText = overrideText || text;
  const drawText = isFlipped ? finalText.split('').reverse().join('') : finalText;
  const fontSize = 13 * (VB / 320);
  const textSpacing = 0.02;
  const startAngleRad = angleDeg * Math.PI / 180;

  // Medición precisa con canvas; fallback heurístico si no está disponible
  let widths = [];
  let measureFn;
  try {
    const measureCanvas = document.createElement('canvas');
    const ctx = measureCanvas.getContext('2d');
    if (ctx) {
      ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, sans-serif`;
      measureFn = ch => ctx.measureText(ch).width;
    }
  } catch (e) { /* ignore */ }
  if (!measureFn) {
    measureFn = ch => fontSize * 0.6; // fallback ancho aproximado
  }

  let totalArc = 0;
  for (const ch of drawText) {
    const w = measureFn(ch);
    widths.push(w);
    totalArc += w / radius;
  }
  totalArc += textSpacing * (drawText.length - 1);

  let currentEdgeAngle = startAngleRad - totalArc/2;

  for (let i = 0; i < drawText.length; i++) {
    const ch = drawText[i];
    const charAngleW = widths[i] / radius;
    const charCenterAngle = currentEdgeAngle + charAngleW/2;
    const x = CX + radius * Math.cos(charCenterAngle);
    const y = CY + radius * Math.sin(charCenterAngle);
    const rotation = isFlipped
      ? (charCenterAngle - Math.PI/2)
      : (charCenterAngle + Math.PI/2);

    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', x);
    t.setAttribute('y', y);
    t.setAttribute('font-size', fontSize);
    t.setAttribute('font-weight', 'bold');
    t.setAttribute('fill', color);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    t.setAttribute('font-family', '-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, sans-serif');
    t.setAttribute('transform', `rotate(${rotation * 180/Math.PI} ${x} ${y})`);
    t.style.pointerEvents = 'none';
    t.textContent = ch;
    parent.appendChild(t);

    currentEdgeAngle += charAngleW + textSpacing;
  }
}

// =====================================================
// ACCIONES DE BOTONES IRREGULARES
// =====================================================
function onIrregularTap(cfg) {
  switch (cfg.action) {
    case 'custom':
      state.isCustomMode = !state.isCustomMode;
      if (!state.isCustomMode) {
        state.illuminatedKeys.clear();
        state.highlightOrder = [];
        state.transposeValue = 0;
        // Resetear completamente NEG y NEG·1 al salir de CUSTOM
        state.isNegativeActive = false;
        state.isNegativeSingleArmed = false;
        state.negativeBackupOrder = null;
        state.negativeBackupIlluminated = null;
        state.negativeSingleFlipped = new Map();
        state.negativeState = 0;
        state.negativeSingleState = 0;
      }
      renderAll();
      break;
    case 'mode':
      // Ciclo: -1 (off) → 0 (Jónico) → 1 (Dórico) → ... → 6 (Locrio) → -1
      state.activeModeIndex = state.activeModeIndex >= 6 ? -1 : state.activeModeIndex + 1;
      recomputeMode();
      updateModeIndicator();
      renderAll();
      break;
    case 'themes':
      // Toggle inmediato Flat ↔ Cyan
      state.theme = state.theme === 'flat' ? 'cyan' : 'flat';
      document.body.classList.toggle('theme-cyan', state.theme === 'cyan');
      renderAll();
      break;
    case 'degrees':
      state.useRomanNumerals = !state.useRomanNumerals;
      renderCircle();
      break;
    case 'transposeUp':
      transposeStep(1);
      renderAll();
      break;
    case 'transposeDown':
      transposeStep(-1);
      renderAll();
      break;
    case 'resetTranspose':
      resetToAnchor();
      renderAll();
      break;
    case 'notation':
      state.useLatinNotation = !state.useLatinNotation;
      renderAll();
      break;
    case 'negative':
      // Requiere progresión presente
      if (!state.isNegativeActive &amp;&amp; state.illuminatedKeys.size === 0) break;
      // Toggle: 0 (apagado) → 1 (activo eje clásico) → 0
      state.negativeState = (state.negativeState + 1) % 2;
      if (state.negativeState === 0) {
        restoreFromNegative();
      } else {
        applyNegativeToProgression(1); // siempre eje clásico (Levy)
      }
      renderAll();
      break;
    case 'negativeSingle':
      // Requiere progresión presente
      if (state.illuminatedKeys.size === 0) break;
      // Mutuamente excluyente con NEG
      if (state.isNegativeActive) {
        restoreFromNegative();
        state.negativeState = 0;
      }
      // Toggle: 0 (apagado) → 1 (armado, eje clásico) → 0
      state.negativeSingleState = (state.negativeSingleState + 1) % 2;
      state.isNegativeSingleArmed = state.negativeSingleState !== 0;
      if (state.negativeSingleState === 0) {
        // Al desarmar, limpiar las casillas ya reflejadas (vuelven al original)
        for (const [flipped, original] of state.negativeSingleFlipped.entries()) {
          const indices = [];
          state.highlightOrder.forEach((k, i) => { if (k === flipped) indices.push(i); });
          for (const i of indices) state.highlightOrder[i] = original;
        }
        state.negativeSingleFlipped = new Map();
        state.illuminatedKeys = new Set(state.highlightOrder);
      }
      renderAll();
      break;
    case 'noop':
    default:
      break;
  }
}
