<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MTM Demo Source</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--panel:#121212;--gold:#c9a84c;--gold2:#f2db96;--text:#f5f0e8;--muted:#9a9488;}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Lato,sans-serif;}
.topbar{display:flex;gap:6px;align-items:center;padding:8px 12px;background:#121212;border-bottom:1px solid rgba(201,168,76,.25)}
.brand{font-family:Cinzel,serif;font-weight:900;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-size:12px;margin-right:10px}
.tab{padding:6px 12px;border:1px solid rgba(201,168,76,.25);background:#101010;color:var(--text);border-radius:4px;text-transform:uppercase;font-size:10px;letter-spacing:1px}
.tab.active{background:var(--gold);color:#090909;font-weight:700}.widget-body{height:calc(100vh - 42px);padding:18px;background:#090909}.panel{display:none;max-width:980px;margin:0 auto}.panel.active{display:block}.module{background:linear-gradient(180deg,#151515,#090909);border:1px solid rgba(201,168,76,.32);border-radius:16px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.45),0 0 28px rgba(201,168,76,.06)}
h2{font-family:Cinzel,serif;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;margin:0 0 12px}.notes{color:var(--muted);margin-bottom:14px;font-size:13px;letter-spacing:.5px}
#circleSvg,#fretSvg,#staffSvg{width:100%;height:auto;display:block}.gold{stroke:var(--gold);fill:none}.gold-fill{fill:var(--gold)}.muted{stroke:rgba(245,240,232,.25)}.note{fill:var(--gold2);font-family:Cinzel,serif;font-weight:900;text-anchor:middle;dominant-baseline:middle}.small{font-size:14px}.big{font-size:28px}.key{stroke:#222;stroke-width:1}.white{fill:#f7f0df}.black{fill:#111}.active-note{fill:var(--gold);stroke:var(--gold2);stroke-width:2}.piano-wrap{background:#0b0b0b;border:1px solid rgba(201,168,76,.25);border-radius:14px;padding:18px}.piano-row{display:flex;height:140px;position:relative}.white-key{height:140px;flex:1;background:#f5f0e8;border:1px solid #1a1a1a;border-radius:0 0 8px 8px;position:relative}.white-key.on{background:linear-gradient(#f2db96,#c9a84c)}.white-key span{position:absolute;bottom:8px;left:0;right:0;text-align:center;color:#111;font-weight:700}.black-key{position:absolute;top:0;width:5.5%;height:86px;background:#111;border:1px solid #000;border-radius:0 0 5px 5px;z-index:2}.black-key.on{background:linear-gradient(#f2db96,#8b6914)}.k1{left:7.5%}.k2{left:18.5%}.k4{left:41%}.k5{left:52%}.k6{left:63%}
.warning{font:11px/1.4 Lato,sans-serif;color:#9a9488;margin-top:14px;border-top:1px solid rgba(201,168,76,.15);padding-top:10px}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">More Than Modes · Demo</div>
  <button class="tab active" data-tab="circulo">Círculo</button>
  <button class="tab" data-tab="fretboard">Fretboard</button>
  <button class="tab" data-tab="piano">Piano</button>
</div>
<div class="widget-body">
  <section id="circlePanel" class="panel active"><div class="module"><h2>Círculo</h2><div class="notes" id="circleNotes"></div><svg id="circleSvg" viewBox="0 0 600 600"></svg><div class="warning">SMOKE TEST: este HTML demo prueba el pipeline. Para producción se debe usar el HTML real de MTM.</div></div></section>
  <section id="fretPanel" class="panel"><div class="module"><h2>Fretboard</h2><div class="notes" id="fretNotes"></div><svg id="fretSvg" viewBox="0 0 900 280"></svg><div class="warning">SMOKE TEST: reemplazar con el iframe/módulo real.</div></div></section>
  <section id="pianoPanel" class="panel"><div id="score-wrap" class="module"><h2>Pentagrama</h2><div class="notes" id="staffNotes"></div><svg id="staffSvg" viewBox="0 0 900 210"></svg></div><div id="piano-wrap" class="piano-wrap" style="margin-top:18px"><h2>Piano</h2><div class="notes" id="pianoNotes"></div><div id="pianoKeys" class="piano-row"></div><div class="warning">SMOKE TEST: reemplazar con el iframe/módulo real.</div></div></section>
</div>
<script>
const panels={circulo:circlePanel,fretboard:fretPanel,piano:pianoPanel};
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');Object.values(panels).forEach(p=>p.classList.remove('active'));panels[b.dataset.tab].classList.add('active');}));
function svgEl(tag,attrs,parent,text){const n=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.entries(attrs||{}).forEach(([k,v])=>n.setAttribute(k,v));if(text!=null)n.textContent=text;parent.appendChild(n);return n;}
function renderCircle(d){circleNotes.textContent=`${d.symbol} = ${d.notes.join(' - ')}`;circleSvg.innerHTML='';const cx=300,cy=300;svgEl('circle',{cx,cy,r:210,class:'gold','stroke-width':2},circleSvg);svgEl('circle',{cx,cy,r:142,class:'muted','stroke-width':1},circleSvg);const notes=['C','G','D','A','E','B','F#','Db','Ab','Eb','Bb','F'];notes.forEach((n,i)=>{const a=(-90+i*30)*Math.PI/180;const x=cx+Math.cos(a)*210,y=cy+Math.sin(a)*210;const on=d.notes.includes(n)||d.root===n;svgEl('circle',{cx:x,cy:y,r:on?28:21,fill:on?'#c9a84c':'#111',stroke:on?'#f2db96':'rgba(201,168,76,.35)','stroke-width':2},circleSvg);svgEl('text',{x,y,class:'note '+(on?'big':'small'),fill:on?'#090909':'#f2db96'},circleSvg,n)});svgEl('text',{x:300,y:300,class:'note big'},circleSvg,d.symbol);}
function renderFret(d){fretNotes.textContent=`${d.symbol} = ${d.notes.join(' - ')}`;fretSvg.innerHTML='';for(let i=0;i<6;i++){svgEl('line',{x1:60,y1:35+i*38,x2:840,y2:35+i*38,stroke:'#c9a84c','stroke-width':i===0||i===5?3:1.6,opacity:.75},fretSvg)}for(let f=0;f<13;f++){svgEl('line',{x1:60+f*65,y1:25,x2:60+f*65,y2:235,stroke:'rgba(245,240,232,.32)','stroke-width':f===0?6:2},fretSvg)}const spots=[[2,3,d.notes[0]],[3,2,d.notes[1]],[5,4,d.notes[2]],[7,1,d.notes[0]],[10,5,d.notes[1]],[12,0,d.notes[2]]];spots.forEach(([f,s,n])=>{const x=60+f*65-32,y=35+s*38;svgEl('circle',{cx:x,cy:y,r:18,class:'active-note'},fretSvg);svgEl('text',{x,y: y+1,class:'note small',fill:'#090909'},fretSvg,n)});}
function renderStaff(d){staffNotes.textContent=`${d.symbol} = ${d.notes.join(' - ')}`;staffSvg.innerHTML='';for(let i=0;i<5;i++)svgEl('line',{x1:70,y1:55+i*24,x2:820,y2:55+i*24,stroke:'#c9a84c','stroke-width':2,opacity:.85},staffSvg);svgEl('text',{x:95,y:108,class:'note big'},staffSvg,'𝄞');d.notes.forEach((n,i)=>{const x=260+i*130,y=[127,91,67][i%3];svgEl('ellipse',{cx:x,cy:y,rx:24,ry:16,fill:'#c9a84c',stroke:'#f2db96','stroke-width':2,transform:`rotate(-18 ${x} ${y})`},staffSvg);svgEl('text',{x,y:y+52,class:'note small'},staffSvg,n)});}
function renderPiano(d){pianoNotes.textContent=`${d.symbol} = ${d.notes.join(' - ')}`;const keys=['C','D','E','F','G','A','B'];pianoKeys.innerHTML=keys.map(k=>`<div class="white-key ${d.notes.includes(k)?'on':''}"><span>${k}</span></div>`).join('')+'<div class="black-key k1"></div><div class="black-key k2"></div><div class="black-key k4"></div><div class="black-key k5"></div><div class="black-key k6"></div>';}
window.MTM_EXPORT={async render(data){renderCircle(data);renderFret(data);renderStaff(data);renderPiano(data);}};
window.MTM_EXPORT.render({symbol:'Dm',notes:['D','F','A'],root:'D'});
</script>
</body>
</html>
